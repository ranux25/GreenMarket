<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>GreenMarket | Se connecter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    <div class="d-flex gap-2 align-items-center mb-4">
      <img src="IMAGES/logo.png" alt="logo" style="width: 60px; height: 60px; object-fit: cover;" class="rounded-circle">
      <h1 class="h3 mb-0 fw-bold text-theme">GreenMarket</h1>
    </div>

    <div class="card p-4 shadow-sm w-100" style="max-width: 450px; border-radius: 12px; border: none;">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold h4">Se connecter</h2>
        <p class="text-muted small">Connectez-vous à votre compte pour continuer</p>
      </div>

      <form>
        <div class="mb-3">
          <label for="Email" class="form-label small fw-medium">Adresse Email</label>
          <input type="email" class="form-control" id="Email" placeholder="vous@exemple.com" name="email">
        </div>

        <div class="mb-3">
          <label for="Password" class="form-label small fw-medium">Mot de passe</label>
          <input type="password" class="form-control" id="Password" placeholder="Entrez votre mot de passe" name="password">
        </div>

        <input type="submit" class="custom-submit-btn w-100 p-2 fw-bold rounded" value="Se connecter">

        <div class="d-flex justify-content-between mb-4 mt-3">
          <div class="form-check mb-0">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label small text-muted" for="remember">
              Se souvenir de moi
            </label>
          </div>
          <div>
            <a class="text-decoration-none text-muted small" href="forgot_password.html">Mot de passe oublié</a>
          </div>
        </div>
        <div class="d-flex align-items-center mt-2 mb-4">
          <div class="border-bottom flex-grow-1"></div>
          <span class="mx-3 text-muted small">Ou</span>
          <div class="border-bottom flex-grow-1"></div>
        </div>
        <div class="d-flex gap-2 w-100 mb-4 mt-3">
          <button type="button" class="btn btn-light border w-50 d-flex align-items-center justify-content-center py-2">
            <i class="bi bi-google me-3"></i>Google          
          </button>
          <button type="button" class="btn btn-light border w-50 d-flex align-items-center justify-content-center">
            <i class="bi bi-apple me-3"></i>Apple
          </button>
        </div>

        <p class="text-center mt-3 mb-0 text-muted small">
          Vous n'avez pas de compte ? <a href="create.html" class="text-theme text-decoration-none fw-medium">Créer un compte</a>
        </p>
        
      </form>
      
    </div>
  </div>
  <script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("Email").value.trim();
  const password = document.getElementById("Password").value.trim();

  let users = JSON.parse(localStorage.getItem("greenmarket_users")) || [];

  const user = users.find(
    u => u.email === email && u.password === password
  );

  if (!user) {
    alert("Email ou mot de passe incorrect");
    return;
  }

  // guardar sesión
  sessionStorage.setItem(
    "greenmarket_current_user",
    JSON.stringify(user)
  );

  alert("Connexion réussie ✅");

  // redirigir según rol
  if (user.role === "productor") {
    window.location.href = "dashboard-producteur.html";
  } else {
    window.location.href = "store.html";
  }
});
</script>

</body>
</html>
