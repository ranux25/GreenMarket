<link rel="stylesheet" href="header.css">
<header>
  <div class="header-container">
    <div class="logo" onclick="window.location.href='accueil.html'">
      <div class="logo-img">
        <img src="IMAGES/logo.png" alt="GreenMarket Logo" onerror="this.src='https://placehold.co/65x65/9FB2AC/5D0D18?text=GM'"/>
      </div>
      <span class="logo-text">GreenMarket</span>
    </div>

    <div class="search-bar">
      <input type="text" id="headerSearchInput" placeholder="Rechercher une boutique artisanale..." 
        onkeydown="if(event.key==='Enter' && this.value.trim()) window.location.href='produits.html?search='+encodeURIComponent(this.value.trim())"/>
    </div>

    <nav class="desktop-nav">
      <a href="accueil.html" class="nav-link" data-nav="accueil">Accueil</a>
      <a href="store.html" class="nav-link" data-nav="store">Boutiques</a>
      <a href="produits.html" class="nav-link" data-nav="produits">Produits</a>
      <a href="apropos.html" class="nav-link" data-nav="apropos">À propos</a>
      <a href="dashboard-producteur.html" id="dashboardLink" class="nav-link" style="display: none;" data-nav="dashboard">📊 Dashboard</a>
    </nav>

    <div class="actions">
      <button class="cart-btn" title="Panier" onclick="window.location.href='panier.html'">
        <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#5D0D18" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 6h14M9 21a1 1 0 1 0 2 0M15 21a1 1 0 1 0 2 0"/>
        </svg>
        <span class="cart-badge" id="cart-count">0</span>
      </button>
      <div id="authWidget"></div>
      <button class="mobile-menu-btn" id="mobileMenuToggle" aria-label="Menu">
        <svg width="24" height="24" fill="none" stroke="#5D0D18" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="accueil.html" class="mobile-nav-link" data-nav="accueil"><span>🏠</span> Accueil</a>
      <a href="store.html" class="mobile-nav-link" data-nav="store"><span>🏪</span> Boutiques</a>
      <a href="produits.html" class="mobile-nav-link" data-nav="produits"><span>📦</span> Produits</a>
      <a href="apropos.html" class="mobile-nav-link" data-nav="apropos"><span>ℹ️</span> À propos</a>
      <a href="dashboard-producteur.html" id="mobileDashboardLink" class="mobile-nav-link" style="display: none;" data-nav="dashboard"><span>📊</span> Dashboard</a>
      <a href="dashboard_client.html" id="clientDashboardLink" class="nav-link" style="display: none;" data-nav="panier">👤 Mon Compte</a>
    </div>
  </div>
</header>
