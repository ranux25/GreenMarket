<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="header.css">
  <style>
    /* Estilos adicionales para asegurar consistencia */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: #9FB2AC;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }
    .mobile-menu.open {
      display: flex;
    }
    .mobile-menu .nav-link {
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .mobile-menu .nav-link:last-child {
      border-bottom: none;
    }
    @media (min-width: 769px) {
      .mobile-menu, .mobile-menu-btn {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<header>
  <div>
    <!-- Logo -->
    <div onclick="window.location.href='accueil.html'">
      <div>
        <img src="IMAGES/logo.png" alt="GreenMarket Logo" onerror="this.src='https://placehold.co/65x65?text=GM'"/>
      </div>
      <span>GreenMarket</span>
    </div>

    <!-- Barra de búsqueda -->
    <div class="search-bar">
      <input type="text" id="headerSearchInput" placeholder="Rechercher une boutique artisanale..."/>
    </div>

    <!-- Navegación desktop -->
    <nav class="desktop-nav">
      <a href="accueil.html" class="nav-link">Accueil</a>
      <a href="store.html" class="nav-link active">Boutiques</a>
      <a href="produits.html" class="nav-link">Produits</a>
      <a href="#" class="nav-link">À propos</a>
      <a href="dashboard-producteur.html" id="dashboardLink" class="nav-link" style="display: none;">📊 Dashboard</a>
    </nav>

    <!-- Acciones (carrito + auth + móvil) -->
    <div>
      <button class="cart-btn" title="Panier" onclick="window.location.href='panier.html'">
        <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#5D0D18" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 6h14M9 21a1 1 0 1 0 2 0M15 21a1 1 0 1 0 2 0"/>
        </svg>
        <span class="cart-badge" id="cart-count">0</span>
      </button>
      <div id="authWidget"></div>
      <button class="mobile-menu-btn" id="mobileMenuToggle" type="button">
        <svg width="24" height="24" fill="none" stroke="#5D0D18" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <!-- Menú móvil -->
    <div class="mobile-menu" id="mobileMenu">
      <a href="accueil.html" class="nav-link">🏠 Accueil</a>
      <a href="store.html" class="nav-link active">🏪 Boutiques</a>
      <a href="produits.html" class="nav-link">📦 Produits</a>
      <a href="#" class="nav-link">ℹ️ À propos</a>
      <a href="dashboard-producteur.html" id="mobileDashboardLink" class="nav-link" style="display: none;">📊 Dashboard</a>
    </div>
  </div>
</header>

<script>
  // Toggle del menú móvil
  const toggleBtn = document.getElementById('mobileMenuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  
  if (toggleBtn && mobileMenu) {
    toggleBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      mobileMenu.classList.toggle('open');
    });
    
    // Cerrar menú al hacer clic en un enlace
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
      });
    });
  }

  // Función para actualizar el contador del carrito
  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('greenmarket_cart') || '[]');
    const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cart-count');
    if (badge) badge.textContent = total;
  }

  // Función para actualizar UI de autenticación
  function updateAuthUI() {
    const widget = document.getElementById('authWidget');
    if (!widget) return;
    
    const userJson = sessionStorage.getItem('greenmarket_current_user');
    const user = userJson ? JSON.parse(userJson) : null;
    
    if (user) {
      const roleText = user.role === 'admin' ? 'Admin' : (user.role === 'productor' ? 'Artisan' : 'Client');
      widget.innerHTML = `<div class="user-badge">👋 ${escapeHtml(user.name)} (${roleText})<button id="logoutBtn" style="background:none;border:none;color:#5d0d18;cursor:pointer;margin-left:8px;">🚪</button></div>`;
      
      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        sessionStorage.removeItem('greenmarket_current_user');
        window.location.reload();
      });
      
      // Mostrar dashboard link
      const dashboardLink = document.getElementById('dashboardLink');
      const mobileDashboardLink = document.getElementById('mobileDashboardLink');
      if (dashboardLink) {
        dashboardLink.style.display = (user.role === 'productor' || user.role === 'admin') ? 'inline-block' : 'none';
      }
      if (mobileDashboardLink) {
        mobileDashboardLink.style.display = (user.role === 'productor' || user.role === 'admin') ? 'block' : 'none';
      }
    } else {
      widget.innerHTML = `<button class="btn-connexion" id="showLoginBtn">🔑 Connexion</button>`;
      document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        // Buscar el modal de autenticación en la página principal
        const modal = document.getElementById('authModal');
        if (modal) modal.classList.add('open');
        else alert('Veuillez vous connecter');
      });
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // Inicializar
  document.addEventListener('DOMContentLoaded', () => {
    updateCartCount();
    updateAuthUI();
  });
</script>

</body>
</html>
