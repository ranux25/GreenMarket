<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>GreenMarket | Mot de passe oublié</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    <div class="d-flex gap-2 align-items-center mb-4">
      <img src="IMAGES/logo.png" alt="logo" style="width: 60px; height: 60px; object-fit: cover;" class="rounded-circle">
      <h1 class="h3 mb-0 fw-bold text-theme">GreenMarket</h1>
    </div>

    <div class="card p-4 shadow-sm w-100" style="max-width: 450px; border-radius: 12px; border: none;">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold h4">Mot de passe oublié</h2>
      </div>

      <form>
        <div class="mb-3">
          <p class="text-muted small">Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe</p>
          <label for="Email" class="form-label small fw-medium">Adresse Email</label>
          <input type="email" class="form-control" id="Email" placeholder="vous@exemple.com" name="email">
        </div>
      
        <input type="submit" class="custom-submit-btn w-100 p-2 fw-bold rounded" value="Réinitialiser le mot de passe">
        
        <div class="text-center mt-3">
          <a href="signin.html" class="text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i> Retour à la connexion
          </a>
        </div>
      </form>
      
    </div>
  </div>
  
</body>
</html>
