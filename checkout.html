<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Validation de commande</title>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="header.css">
<style>
  :root {
    --cream:      #fff9eb;
    --sage:       #9fb2ac;
    --sage-dark:  #7a9490;
    --sage-light: #c8d8d4;
    --wine:       #5d0d18;
    --wine-dark:  #3e0910;
    --wine-light: #8c2030;
    --wine-pale:  #f5e6e8;
    --text:       #2a1a1c;
    --text-muted: #6b5055;
    --border:     #e8ddd0;
    --white:      #fffdf7;
    --shadow:     rgba(93,13,24,.10);
    --shadow-md:  rgba(93,13,24,.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  .btn-back {
    background: var(--wine-pale);
    color: var(--wine);
    padding: 0.5rem 1.3rem;
    border-radius: 3px;
    text-decoration: none;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-back:hover {
    background: var(--wine);
    color: var(--cream);
  }

  .page-header1 {
    background: var(--wine);
    padding: 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    right: -80px;
    top: -80px;
    width: 420px;
    height: 420px;
    border: 55px solid rgba(255,249,235,.05);
    border-radius: 50%;
  }
  .page-header::after {
    content: '';
    position: absolute;
    left: 4%;
    bottom: -70px;
    width: 240px;
    height: 240px;
    border: 40px solid rgba(159,178,172,.10);
    border-radius: 50%;
  }
  .header-inner1 {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left1 .header-eyebrow {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: .9rem;
  }
  .header-left1 h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--cream);
  }
  .header-left1 p {
    color: rgba(255,249,235,.62);
    font-size: .9rem;
  }

  .container {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .checkout-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
  }

  .checkout-form {
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 1.5rem;
  }
  .form-section {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .form-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .form-section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 0.7rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    font-size: 0.9rem;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--wine);
  }
  .radio-group {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 0.5rem 0;
  }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    text-transform: none;
    letter-spacing: normal;
    font-weight: normal;
    cursor: pointer;
  }

  .order-summary-card {
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 1.5rem;
    position: sticky;
    top: 90px;
  }
  .order-summary-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .shop-info-mini {
    display: flex;
    gap: 0.8rem;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .shop-icon {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .shop-info-mini h4 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--wine);
  }
  .shop-info-mini p {
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .order-items {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .order-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
  }
  .order-item:last-child {
    border-bottom: none;
  }
  .order-item-img {
    width: 45px;
    height: 45px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--sage-light);
    flex-shrink: 0;
  }
  .order-item-details {
    flex: 1;
  }
  .order-item-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
  }
  .order-item-price {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .order-item-total {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--wine);
    flex-shrink: 0;
  }
  .order-total {
    padding-top: 1rem;
    border-top: 2px solid var(--border);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 0.4rem 0;
    font-size: 0.9rem;
  }
  .total-row .label {
    color: var(--text-muted);
  }
  .total-row.grand-total {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--wine);
    padding-top: 0.8rem;
    margin-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .btn-confirm {
    width: 100%;
    background: var(--wine);
    color: white;
    border: none;
    padding: 0.9rem;
    border-radius: 40px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 1rem;
  }
  .btn-confirm:hover {
    background: var(--wine-dark);
  }

  .success-card {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
  }
  .success-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }
  .success-card h2 {
    color: var(--wine);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .success-card p {
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .order-number {
    display: inline-block;
    background: var(--wine-pale);
    color: var(--wine);
    font-weight: 700;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    margin: 1rem 0;
    font-size: 1rem;
  }
  .success-actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-filled {
    background: var(--wine);
    color: white;
    padding: 0.7rem 1.5rem;
    border-radius: 3px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    display: inline-block;
    transition: background 0.2s;
  }
  .btn-filled:hover {
    background: var(--wine-dark);
  }

  .error-field {
    border-color: #c0392b !important;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--wine);
    color: var(--cream);
    padding: 0.85rem 1.5rem;
    border-radius: 5px;
    font-size: 0.86rem;
    font-weight: 500;
    box-shadow: 0 8px 28px var(--shadow-md);
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .footer-note {
    text-align: center;
    margin-top: 3rem;
    padding: 1.5rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 800px) {
    .checkout-grid {
      grid-template-columns: 1fr;
    }
    .container {
      padding: 0 1rem;
    }
    .form-row {
      grid-template-columns: 1fr;
    }
  }
</style>
<body>
<div id="header-placeholder"></div>
<div class="page-header1">
  <div class="header-inner1">
    <div class="header-left1">
      <div class="header-eyebrow">🛍️ FINALISER VOTRE COMMANDE</div>
      <h1>Validation<br>de commande</h1>
      <p>Vérifiez vos informations et confirmez votre achat</p>
    </div>
  </div>
</div>

<div class="container">
  <div id="content">
    <div style="text-align:center; padding:3rem;">Chargement de votre commande...</div>
  </div>
</div>

<div class="footer-note">
  🌿 GreenMarket – Mettre en valeur les producteurs locaux
</div>

<script>


  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showToast(msg, bg) {
    let t = document.getElementById('toast');
    if (!t) {
      var toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    var toastEl = document.getElementById('toast');
    toastEl.innerHTML = msg;
    if (bg) toastEl.style.background = bg;
    toastEl.classList.add('show');
    setTimeout(function() {
      toastEl.classList.remove('show');
    }, 3200);
  }

  // --- CORRECTION 1 : Nettoyage strict des espaces pour éviter les prix à 0 ---
  function extraerPrecio(precioStr) {
    if (typeof precioStr === 'number') return precioStr;
    if (!precioStr) return 0;
    var strClean = String(precioStr).replace(/\s/g, ''); // Enlève " 500" pour que ça devienne "500"
    var match = strClean.match(/(\d+(?:[.,]\d+)?)/);
    if (match) {
      return parseFloat(match[1].replace(',', '.'));
    }
    return 0;
  }

  // --- CORRECTION 2 : Récupération intelligente des prix depuis le LocalStorage ---
  function obtenerDatosCheckout() {
    var params = new URLSearchParams(window.location.search);
    var productos = [];
    var productosRaw = params.get('products');
    
    if (productosRaw) {
      try {
        productos = JSON.parse(decodeURIComponent(productosRaw));
      } catch(e) {
        console.error('Error parsing products:', e);
        productos = [];
      }
    }
    
    // Pour combler les pertes du nom de variable (price vs prix), on fait un double contrôle en lisant directement le panier local.
    var carritoLocal = [];
    try {
      var rawLocal = localStorage.getItem('greenmarket_cart');
      if (rawLocal) {
        carritoLocal = JSON.parse(rawLocal);
      }
    } catch(e) {}
    
    if (productos.length === 0) {
      productos = carritoLocal;
    }
    
    var productosNormalizados = [];
    var primeraTienda = null;
    
    for (var i = 0; i < productos.length; i++) {
      var p = productos[i];
      var pLocal = carritoLocal.find(function(item) { return item.id == (p.id || p.productId); }) || {};
      
      var tiendaNombre = p.boutiqueNom || p.shopName || pLocal.boutiqueNom || 'Boutique';
      var tiendaId = p.boutiqueId || p.shopId || pLocal.boutiqueId || 1;
      
      if (!primeraTienda) {
        primeraTienda = { id: tiendaId, nombre: tiendaNombre };
      }
      
      // On teste toutes les combinaisons de mots possibles pour retrouver le montant :
      var precioFinal = p.price || p.prix || pLocal.price || pLocal.prix || pLocal.prixNumerique || 0;
      
      productosNormalizados.push({
        id: p.id || p.productId || pLocal.id,
        name: p.nom || p.name || pLocal.name,
        price: precioFinal,
        image: p.image || pLocal.image,
        quantity: p.quantite || p.quantity || pLocal.quantity || 1,
        boutiqueId: tiendaId,
        boutiqueNom: tiendaNombre
      });
    }
    
    return {
      idTienda: primeraTienda ? primeraTienda.id : '',
      nombreTienda: primeraTienda ? primeraTienda.nombre : 'Boutique',
      productos: productosNormalizados
    };
  }

  function actualizarTotales(productos, modoEnvio) {
    var subtotal = 0;
    for (var i = 0; i < productos.length; i++) {
      var precio = extraerPrecio(productos[i].price);
      var cantidad = productos[i].quantity || 1;
      subtotal += precio * cantidad;
    }
    var envio = (modoEnvio === 'pickup') ? 0 : 250;
    var total = subtotal + envio;
    
    var subtotalEl = document.getElementById('subtotalAmount');
    var envioEl = document.getElementById('deliveryAmount');
    var totalEl = document.getElementById('totalAmount');
    var envioLabel = document.getElementById('deliveryLabel');
    
    if (subtotalEl) subtotalEl.textContent = Math.round(subtotal) + ' DH';
    if (envioEl) envioEl.textContent = Math.round(envio) + ' DH';
    if (totalEl) totalEl.textContent = Math.round(total) + ' DH';
    if (envioLabel) envioLabel.textContent = (modoEnvio === 'pickup') ? 'Retrait (gratuit)' : 'Livraison';
    
    return { subtotal: subtotal, envio: envio, total: total };
  }

  function confirmarPedido(datos) {
    var firstName = document.getElementById('firstName')?.value.trim() || '';
    var lastName = document.getElementById('lastName')?.value.trim() || '';
    var email = document.getElementById('email')?.value.trim() || '';
    var phone = document.getElementById('phone')?.value.trim() || '';
    var address = document.getElementById('address')?.value.trim() || '';
    var zipcode = document.getElementById('zipcode')?.value.trim() || '';
    var city = document.getElementById('city')?.value.trim() || '';
    var notes = document.getElementById('notes')?.value.trim() || '';
    
    var modoEnvio = document.querySelector('input[name="delivery"]:checked')?.value || 'delivery';
    var modoPago = document.querySelector('input[name="payment"]:checked')?.value || 'card';
    
    var errores = [];
    if (!firstName) errores.push('firstName');
    if (!lastName) errores.push('lastName');
    if (!email) errores.push('email');
    if (modoEnvio !== 'pickup') {
      if (!address) errores.push('address');
      if (!zipcode) errores.push('zipcode');
      if (!city) errores.push('city');
    }
    
    var camposError = document.querySelectorAll('.error-field');
    for (var i = 0; i < camposError.length; i++) {
      camposError[i].classList.remove('error-field');
    }
    
    if (errores.length > 0) {
      for (var j = 0; j < errores.length; j++) {
        var campo = document.getElementById(errores[j]);
        if (campo) campo.classList.add('error-field');
      }
      showToast("⚠️ Veuillez remplir tous les champs obligatoires", '#9a4a00');
      return;
    }
    
    if (email.indexOf('@') === -1) {
      document.getElementById('email')?.classList.add('error-field');
      showToast("⚠️ Veuillez entrer un email valide", '#9a4a00');
      return;
    }
    
    var subtotal = 0;
    for (var k = 0; k < datos.productos.length; k++) {
      var precio = extraerPrecio(datos.productos[k].price);
      var cantidad = datos.productos[k].quantity || 1;
      subtotal += precio * cantidad;
    }
    var envio = (modoEnvio === 'pickup') ? 0 : 250;
    var total = subtotal + envio;
    
    var pedido = {
      id: Date.now(),
      numeroPedido: 'CMD-' + Date.now().toString().slice(-8),
      fecha: new Date().toLocaleString('fr-FR'),
      idTienda: datos.idTienda,
      nombreTienda: datos.nombreTienda,
      cliente: {
        nombre: firstName,
        apellido: lastName,
        email: email,
        telefono: phone,
        direccion: (modoEnvio === 'pickup') ? 'Retrait en boutique' : address + ', ' + zipcode + ' ' + city
      },
      productos: datos.productos.map(function(p) {
        return {
          id: p.id,
          nombre: p.name,
          precio: p.price,
          cantidad: p.quantity || 1
        };
      }),
      subtotal: subtotal,
      envio: envio,
      total: total,
      modoEnvio: modoEnvio,
      modoPago: modoPago,
      notas: notes,
      estado: 'confirmada'
    };
    
    var pedidosExistentes = JSON.parse(localStorage.getItem('greenmarket_orders') || '[]');
    pedidosExistentes.push(pedido);
    localStorage.setItem('greenmarket_orders', JSON.stringify(pedidosExistentes));
    
    localStorage.removeItem('greenmarket_cart');
    
    var contenedor = document.getElementById('content');
    contenedor.innerHTML = `
      <div class="success-card">
        <div class="success-icon">🎉</div>
        <h2>Commande confirmée !</h2>
        <p>Merci pour votre commande, <strong>${escapeHtml(firstName)} ${escapeHtml(lastName)}</strong>.</p>
        <div class="order-number">N° ${pedido.numeroPedido}</div>
        <p>Un email de confirmation a été envoyé à <strong>${escapeHtml(email)}</strong>.</p>
        <p><strong>Total payé :</strong> ${Math.round(total)} DH</p>
        <div class="success-actions">
          <a href="store.html" class="btn-filled">🏠 Retour aux boutiques</a>
          <a href="info-store.html?id=${datos.idTienda}" class="btn-back" style="display:inline-block;">← Retour à la boutique</a>
        </div>
      </div>
    `;
    
    showToast("✅ Commande confirmée !");
  }

  function cargarCheckout() {
    var datos = obtenerDatosCheckout();
    
    if (!datos.idTienda || datos.productos.length === 0) {
      document.getElementById('content').innerHTML = `
        <div style="text-align:center; padding:3rem; background:var(--wine-pale); border-radius:12px;">
          <div style="font-size:3rem; margin-bottom:1rem;">🛒</div>
          <h2 style="color:var(--wine);">Panier vide</h2>
          <p style="margin:1rem 0;">Aucun produit sélectionné pour la commande.</p>
          <a href="store.html" class="btn-back">← Retour aux boutiques</a>
        </div>
      `;
      return;
    }
    
    var itemsHtml = '';
    for (var i = 0; i < datos.productos.length; i++) {
      var p = datos.productos[i];
      var precioNum = extraerPrecio(p.price);
      var cantidad = p.quantity || 1;
      var totalProducto = precioNum * cantidad;
      itemsHtml += `
        <div class="order-item">
          <img src="${escapeHtml(p.image || '')}" class="order-item-img" 
               onerror="this.src='https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=80&h=80&fit=crop'">
          <div class="order-item-details">
            <div class="order-item-name">${escapeHtml(p.name)}</div>
            <div class="order-item-price">${Math.round(precioNum)} DH × ${cantidad}</div>
          </div>
          <div class="order-item-total">${Math.round(totalProducto)} DH</div>
        </div>
      `;
    }
    
    var html = `
      <div class="checkout-grid">
        <div class="checkout-form">
          <div class="form-section">
            <h3>📋 Informations de livraison</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="firstName" placeholder="Votre prénom">
              </div>
              <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="lastName" placeholder="Votre nom">
              </div>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="email" placeholder="votre@email.com">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="tel" id="phone" placeholder="06 00 00 00 00">
            </div>
            <div id="seccionDireccion">
              <div class="form-group">
                <label>Adresse *</label>
                <input type="text" id="address" placeholder="Numéro et rue">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Code postal *</label>
                  <input type="text" id="zipcode" placeholder="93000">
                </div>
                <div class="form-group">
                  <label>Ville *</label>
                  <input type="text" id="city" placeholder="Tétouan">
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>🚚 Mode de livraison</h3>
            <div class="radio-group">
              <label><input type="radio" name="delivery" value="delivery" checked> 📦 Livraison à domicile (+250 DH)</label>
              <label><input type="radio" name="delivery" value="pickup"> 🏪 Retrait en boutique (Gratuit)</label>
            </div>
          </div>

          <div class="form-section">
            <h3>💳 Mode de paiement</h3>
            <div class="radio-group">
              <label><input type="radio" name="payment" value="card" checked> 💳 Carte bancaire</label>
              <label><input type="radio" name="payment" value="paypal"> 📱 PayPal</label>
              <label><input type="radio" name="payment" value="cash"> 💶 Espèce à la livraison</label>
            </div>
          </div>

          <div class="form-section">
            <h3>📝 Notes (optionnel)</h3>
            <textarea id="notes" rows="2" placeholder="Instructions particulières..."></textarea>
          </div>
        </div>

        <div class="order-summary-card">
          <h3>🛍️ Récapitulatif</h3>
          <div class="shop-info-mini">
            <div class="shop-icon">🌿</div>
            <div>
              <h4>${escapeHtml(datos.nombreTienda)}</h4>
              <p>Boutique vérifiée</p>
            </div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">
            <div class="total-row">
              <span class="label">Sous-total</span>
              <span id="subtotalAmount">0 DH</span>
            </div>
            <div class="total-row">
              <span class="label" id="deliveryLabel">Livraison</span>
              <span id="deliveryAmount">250 DH</span>
            </div>
            <div class="total-row grand-total">
              <span>Total</span>
              <span id="totalAmount">0 DH</span>
            </div>
          </div>
          <button class="btn-confirm" id="btnConfirmar">✅ Confirmer la commande</button>
        </div>
      </div>
    `;
    
    document.getElementById('content').innerHTML = html;
    
    actualizarTotales(datos.productos, 'delivery');
    
    var radiosEnvio = document.querySelectorAll('input[name="delivery"]');
    for (var i = 0; i < radiosEnvio.length; i++) {
      radiosEnvio[i].addEventListener('change', function(e) {
        var modo = e.target.value;
        actualizarTotales(datos.productos, modo);
        var seccionDir = document.getElementById('seccionDireccion');
        if (seccionDir) {
          seccionDir.style.display = (modo === 'pickup') ? 'none' : 'block';
        }
      });
    }
    
    document.getElementById('btnConfirmar').onclick = function() {
      confirmarPedido(datos);
    };
  }
  
  window.addEventListener('DOMContentLoaded', function() {
      
      cargarCheckout();
  });
</script>
<script src="header-loader.js"></script>
</body>
</html>
