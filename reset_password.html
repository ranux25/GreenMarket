<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>GreenMarket | Réinitialiser le mot de passe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    <div class="d-flex gap-2 align-items-center mb-4">
      <img src="IMAGES/logo.png" alt="logo" style="width: 60px; height: 60px; object-fit: cover;" class="rounded-circle">
      <h1 class="h3 mb-0 fw-bold text-theme">GreenMarket</h1>
    </div>

    <div class="card p-4 shadow-sm w-100" style="max-width: 450px; border-radius: 12px; border: none;">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold h4">Réinitialiser le mot de passe</h2>
      </div>

      <form>
        <div class="mb-3">
          <label for="Password" class="form-label small fw-medium">Mot de passe</label>
          <input type="password" class="form-control" id="Password" placeholder="Créez un mot de passe fort" name="password">
        </div>

        <div class="mb-3">
          <label for="Confirmation" class="form-label small fw-medium">Confirmer le mot de passe</label>
          <input type="password" class="form-control" id="Confirmation" placeholder="Confirmez votre mot de passe" name="confpassword">
        </div>

        <input type="submit" class="custom-submit-btn w-100 p-2 fw-bold rounded" value="Mettre à jour le mot de passe">
      </form>
      
    </div>
  </div>
  
</body>
</html>
