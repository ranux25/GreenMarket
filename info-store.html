<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Détail boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #fff9eb;
    --sage:       #9fb2ac;
    --sage-dark:  #7a9490;
    --sage-light: #c8d8d4;
    --wine:       #5d0d18;
    --wine-dark:  #3e0910;
    --wine-light: #8c2030;
    --wine-pale:  #f5e6e8;
    --text:       #2a1a1c;
    --text-muted: #6b5055;
    --border:     #e8ddd0;
    --white:      #fffdf7;
    --shadow:     rgba(93,13,24,.10);
    --shadow-md:  rgba(93,13,24,.18);
    --primary: #5D0D18;
    --secondary: #9FB2AC;
    --bg: #FFF9EB;
    --text-dark: #2C2C2C;
    --text-light: #6B6B6B;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  .search-bar input {
    border: 1.5px solid #e8dfc8;
    background: #fdf8ee;
    border-radius: 999px;
    padding: 10px 20px;
    width: 100%;
    max-width: 420px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text-dark);
  }
  .search-bar input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(93,13,24,0.08);
  }

  .nav-link {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-dark);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.2s;
    padding: 4px 0;
    position: relative;
  }
  .nav-link::after {
    content: '';
    display: block;
    height: 2px;
    background: var(--primary);
    transform: scaleX(0);
    transition: transform 0.25s;
    border-radius: 2px;
  }
  .nav-link:hover { color: var(--primary); }
  .nav-link:hover::after { transform: scaleX(1); }

  .cart-btn {
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .cart-badge {
    position: absolute;
    top: -5px; right: -7px;
    background: var(--primary);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 999px;
    min-width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
  }

  .desktop-nav {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  @media (max-width: 640px) {
    .desktop-nav { display: none; }
  }

  .btn-connexion {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 8px 20px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-connexion:hover {
    background: #7a1020;
    transform: translateY(-1px);
  }

  .user-badge {
    background: var(--wine-pale);
    padding: 0.4rem 1rem;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--wine);
    font-weight: 600;
    font-size: 0.85rem;
  }

  .btn-back {
    background: var(--wine-pale);
    color: var(--wine);
    padding: 0.5rem 1.3rem;
    border-radius: 3px;
    text-decoration: none;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-back:hover {
    background: var(--wine);
    color: var(--cream);
  }

  .page-header {
    background: var(--wine);
    padding: 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    right: -80px;
    top: -80px;
    width: 420px;
    height: 420px;
    border: 55px solid rgba(255,249,235,.05);
    border-radius: 50%;
  }
  .page-header::after {
    content: '';
    position: absolute;
    left: 4%;
    bottom: -70px;
    width: 240px;
    height: 240px;
    border: 40px solid rgba(159,178,172,.10);
    border-radius: 50%;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left .header-eyebrow {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: .9rem;
  }
  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--cream);
  }
  .header-left p {
    color: rgba(255,249,235,.62);
    font-size: .9rem;
  }

  .container {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .shop-detail-card {
    background: var(--white);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 40px var(--shadow);
    border: 1.5px solid var(--border);
  }

  .shop-banner {
    height: 320px;
    position: relative;
    overflow: hidden;
  }
  .shop-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .shop-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(42,26,28,.4));
  }

  .shop-body {
    padding: 1.8rem 2rem 2rem;
  }

  .shop-title {
    margin-bottom: 1.5rem;
  }
  .shop-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .shop-category {
    display: inline-block;
    background: var(--sage-light);
    color: var(--sage-dark);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.8rem;
    border-radius: 3px;
  }
  .shop-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.8rem;
  }
  .tag {
    background: var(--border);
    color: var(--text-muted);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.18rem 0.6rem;
    border-radius: 2px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    background: var(--cream);
    padding: 1rem;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    margin-bottom: 2rem;
  }
  .stat-card {
    text-align: center;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--wine);
    display: block;
  }
  .stat-label {
    font-size: .7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .stars {
    display: flex;
    gap: 2px;
    justify-content: center;
    margin-top: 4px;
  }
  .star { color: var(--wine); font-size: .8rem; }
  .star.empty { color: var(--border); }

  .section {
    margin-bottom: 2rem;
  }
  .section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--border);
    display: inline-block;
  }
  .section-desc {
    font-size: .95rem;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
    margin-top: 1rem;
  }
  .product-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.25s ease;
  }
  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--sage);
    box-shadow: 0 8px 20px var(--shadow);
  }
  .product-image {
    height: 150px;
    overflow: hidden;
  }
  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .product-card:hover .product-image img {
    transform: scale(1.05);
  }
  .product-info {
    padding: 0.8rem;
  }
  .product-name {
    font-weight: 700;
    color: var(--wine);
    font-size: 0.9rem;
  }
  .product-price {
    font-weight: 700;
    color: var(--sage-dark);
    margin: 0.3rem 0;
    font-size: 1rem;
  }
  .product-stock {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .product-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .btn-add-to-cart {
    flex: 2;
    background: var(--sage);
    color: white;
    border: none;
    padding: 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add-to-cart:hover {
    background: var(--wine);
  }
  .btn-buy-now {
    flex: 1;
    background: var(--wine);
    color: white;
    border: none;
    padding: 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-buy-now:hover {
    background: var(--wine-dark);
  }
  .btn-delete {
    background: var(--border);
    color: var(--wine);
    border: none;
    padding: 0.5rem 0.8rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .btn-delete:hover {
    background: var(--wine);
    color: white;
  }
  .btn-edit {
    background: var(--sage-light);
    color: var(--sage-dark);
    border: none;
    padding: 0.5rem 0.8rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .btn-edit:hover {
    background: var(--sage);
    color: white;
  }
  .empty-products {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    background: var(--cream);
    border-radius: 8px;
  }

  .producer-card {
    display: flex;
    gap: 1.2rem;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    flex-wrap: wrap;
  }
  .producer-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .producer-info {
    flex: 1;
  }
  .producer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }
  .producer-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin: 0.3rem 0;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .producer-bio {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .badge-list {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--wine-pale);
    color: var(--wine);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    font-weight: 600;
  }
  .btn-profil {
    margin-top: 1rem;
    background: var(--sage);
    color: white;
    border: none;
    padding: 0.6rem 1rem;
    border-radius: 3px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    font-size: 0.8rem;
    transition: background 0.2s;
  }
  .btn-profil:hover { background: var(--wine); }
  .btn-dashboard {
    background: var(--wine);
    color: white;
    margin-top: 0.5rem;
  }
  .btn-dashboard:hover { background: var(--wine-dark); }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal-content {
    background: var(--white);
    border-radius: 8px;
    padding: 1.5rem;
    max-width: 450px;
    width: 90%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  .modal-content h3 {
    color: var(--wine);
    margin-bottom: 1rem;
    font-family: 'Cormorant Garamond', serif;
  }
  .modal-content input, .modal-content textarea, .modal-content select {
    width: 100%;
    padding: 0.7rem;
    margin-bottom: 1rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    background: var(--cream);
  }
  .image-option-group {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .image-option-group label {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .image-preview {
    margin-top: 0.5rem;
    width: 100%;
    min-height: 120px;
    background: var(--cream);
    border: 2px dashed var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.2s;
  }
  .image-preview.drag-over {
    border-color: var(--wine);
    background: var(--wine-pale);
  }
  .image-preview img {
    max-width: 100%;
    max-height: 150px;
    object-fit: contain;
  }
  .preview-placeholder {
    text-align: center;
    padding: 1rem;
    color: var(--text-muted);
    font-size: 0.8rem;
  }
  .preview-placeholder::before {
    content: "🖼️ ";
    font-size: 1.5rem;
    display: block;
    margin-bottom: 0.3rem;
  }
  .btn-clear-image {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(93,13,24,0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .btn-clear-image:hover {
    background: var(--wine);
  }
  .modal-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 0.5rem;
  }
  .modal-actions button {
    flex: 1;
    padding: 0.6rem;
    border-radius: 3px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-save { background: var(--wine); color: white; }
  .btn-cancel { background: var(--border); color: var(--text-muted); }

  .loading, .error {
    text-align: center;
    padding: 3rem;
  }
  .error {
    background: var(--wine-pale);
    border-radius: 8px;
    color: var(--wine);
  }
  .footer-note {
    text-align: center;
    margin-top: 3rem;
    padding: 1.5rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--wine);
    color: var(--cream);
    padding: .85rem 1.5rem;
    border-radius: 5px;
    font-size: .86rem;
    font-weight: 500;
    box-shadow: 0 8px 28px var(--shadow-md);
    z-index: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all .35s cubic-bezier(.34,1.4,.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .auth-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .auth-modal-overlay.open { display: flex; }
  .auth-modal {
    background: var(--white);
    border-radius: 16px;
    padding: 2rem;
    max-width: 450px;
    width: 90%;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  .auth-tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .auth-tab {
    background: none;
    border: none;
    padding: 0.5rem 1rem;
    font-size: 1rem;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 500;
  }
  .auth-tab.active { color: var(--wine); border-bottom: 2px solid var(--wine); }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-form h3 { color: var(--wine); margin-bottom: 1rem; font-family: 'Cormorant Garamond', serif; }
  .auth-form input {
    width: 100%; padding: 0.7rem; margin-bottom: 1rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Jost', sans-serif; background: var(--cream);
  }
  .auth-error { color: #d9534f; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }
  .auth-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }

  .btn-filled {
    background: var(--wine); color: var(--cream);
    border: none; padding: .5rem 1.3rem; border-radius: 3px;
    font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 600;
    letter-spacing: .07em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .btn-filled:hover { background: var(--wine-dark); }

  .file-input-wrapper {
    position: relative;
    margin-bottom: 1rem;
  }
  .file-input-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--sage-light);
    color: var(--sage-dark);
    padding: 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    transition: background 0.2s;
  }
  .file-input-label:hover {
    background: var(--sage);
    color: white;
  }
  .file-input-label input {
    display: none;
  }

  @media (max-width: 700px) {
    .desktop-nav { display: none; }
    .container { padding: 0 1rem; }
    .shop-body { padding: 1rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .shop-banner { height: 220px; }
    .products-grid { grid-template-columns: 1fr; }
    .shop-name { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">🌱 DÉCOUVREZ CETTE BOUTIQUE</div>
      <h1>Détail de la<br>boutique</h1>
      <p>Tous les produits et informations du producteur</p>
    </div>
    <a href="store.html" class="btn-back">← Retour aux boutiques</a>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading">Chargement des informations...</div>
  </div>
</div>

<div class="footer-note">
  🌿 GreenMarket – Mettre en valeur les producteurs locaux
</div>

<div class="auth-modal-overlay" id="authModal">
  <div class="auth-modal">
    <div class="auth-tabs"><button class="auth-tab active" data-tab="login">Connexion</button></div>
    <div id="loginForm" class="auth-form active">
      <h3>🔐 Se connecter</h3>
      <input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Mot de passe">
      <button class="btn-filled" id="doLoginBtn" style="width:100%">Se connecter</button>
      <p class="auth-error" id="loginError"></p>
    </div>
    <button class="auth-close" id="closeAuthModal">✕</button>
  </div>
</div>

<script>
  function loadHeaderAndInit() {
    fetch('header.html')
      .then(response => {
        if (!response.ok) throw new Error("Erreur");
        return response.text();
      })
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
        initAuth();
        loadShop();
      })
      .catch(error => {
        console.error(error);
        initAuth();
        loadShop();
      });
  }

  let currentUser = null;
  let productsData = {};
  let currentImageDataUrl = null;

  function getPanier() {
    const saved = localStorage.getItem('greenmarket_panier');
    return saved ? JSON.parse(saved) : [];
  }

  function sauvegarderPanier(panier) {
    localStorage.setItem('greenmarket_panier', JSON.stringify(panier));
    mettreAJourCompteurPanier();
  }

  function mettreAJourCompteurPanier() {
    const panier = getPanier();
    const totalItems = panier.reduce((sum, item) => sum + item.quantite, 0);
    const cartCountSpan = document.getElementById('cart-count');
    if (cartCountSpan) {
      cartCountSpan.textContent = totalItems;
    }
  }

  function ajouterAuPanier(produit, boutiqueId, boutiqueNom) {
    let panier = getPanier();
    const existing = panier.find(p => p.id === produit.id);
    
    if (existing) {
      existing.quantite += 1;
    } else {
      let prixNumerique = 5;
      if (produit.price) {
        const match = String(produit.price).match(/(\d+(?:[.,]\d+)?)/);
        if (match) {
          prixNumerique = parseFloat(match[1].replace(',', '.'));
        }
      }
      
      panier.push({
        id: produit.id,
        nom: produit.name,
        prix: produit.price,
        prixNumerique: prixNumerique,
        image: produit.image,
        boutiqueId: boutiqueId,
        boutiqueNom: boutiqueNom,
        quantite: 1
      });
    }
    
    sauvegarderPanier(panier);
    showToast(`✅ ${produit.name} ajouté au panier`);
  }

  function acheterMaintenant(produit, boutiqueId, boutiqueNom) {
    let panier = [];
    let prixNumerique = 5;
    if (produit.price) {
      const match = String(produit.price).match(/(\d+(?:[.,]\d+)?)/);
      if (match) {
        prixNumerique = parseFloat(match[1].replace(',', '.'));
      }
    }
    
    panier.push({
      id: produit.id,
      nom: produit.name,
      prix: produit.price,
      prixNumerique: prixNumerique,
      image: produit.image,
      boutiqueId: boutiqueId,
      boutiqueNom: boutiqueNom,
      quantite: 1
    });
    
    sauvegarderPanier(panier);
    
    const produitsPourCheckout = panier.map(p => ({
      id: p.id,
      name: p.nom,
      price: p.prix,
      image: p.image,
      quantity: p.quantite,
      boutiqueId: p.boutiqueId,
      boutiqueNom: p.boutiqueNom
    }));
    
    const encodedProducts = encodeURIComponent(JSON.stringify(produitsPourCheckout));
    window.location.href = `checkout.html?shopId=${boutiqueId}&shopName=${encodeURIComponent(boutiqueNom)}&products=${encodedProducts}`;
  }

  function getCurrentUser() {
    const userJson = sessionStorage.getItem("greenmarket_current_user");
    if (!userJson) return null;
    const user = JSON.parse(userJson);
    if (user.role === "Producer") user.role = "productor";
    if (user.role === "Customer") user.role = "client";
    return user;
  }

  function updateAuthUI() {
    const widget = document.getElementById('authWidget');
    if (!widget) return;
    const user = getCurrentUser();
    if (user) {
      const roleText = user.role === 'admin' ? 'Admin' : (user.role === 'productor' ? 'Artisan' : 'Client');
      widget.innerHTML = `<div class="user-badge">👋 ${escapeHtml(user.name)} (${roleText})<button id="logoutBtn" style="background:none;border:none;color:#5d0d18;cursor:pointer;margin-left:8px;">🚪</button></div>`;
      document.getElementById('logoutBtn')?.addEventListener('click', logout);
    } else {
      widget.innerHTML = `<button class="btn-connexion" id="showLoginBtn">🔑 Connexion</button>`;
      document.getElementById('showLoginBtn')?.addEventListener('click', () => window.location.href = 'signin.html');
    }
  }

  function logout() {
    sessionStorage.removeItem('greenmarket_current_user');
    currentUser = null;
    updateAuthUI();
    location.reload();
  }

  function showAuthModal() {
    const modal = document.getElementById('authModal');
    if(modal) modal.classList.add('open');
  }

  function closeAuthModal() {
    const modal = document.getElementById('authModal');
    if(modal) modal.classList.remove('open');
  }

  function setupAuthModal() {
    const btn = document.getElementById('doLoginBtn');
    if(btn) {
      btn.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const result = login(email, password);
        if (result.success) {
          closeAuthModal();
          updateAuthUI();
          showToast(`👋 Bonjour ${result.user.name} !`);
          location.reload();
        } else {
          document.getElementById('loginError').textContent = result.error;
        }
      });
    }
    const closeBtn = document.getElementById('closeAuthModal');
    if(closeBtn) closeBtn.addEventListener('click', closeAuthModal);
    const modal = document.getElementById('authModal');
    if(modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeAuthModal();
      });
    }
  }

  function login(email, password) {
    const users = JSON.parse(localStorage.getItem('greenmarket_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    if (user) {
      const { password, ...safeUser } = user;
      sessionStorage.setItem('greenmarket_current_user', JSON.stringify(safeUser));
      return { success: true, user: safeUser };
    }
    return { success: false, error: "Email ou mot de passe incorrect" };
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function getShopIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  function starsHtml(rating) {
    let full = Math.floor(rating);
    let stars = '';
    for (let i = 0; i < 5; i++) {
      if (i < full) stars += '<span class="star">★</span>';
      else stars += '<span class="star empty">★</span>';
    }
    return stars;
  }

  function showToast(msg, bg = 'var(--wine)') {
    let toast = document.getElementById('toast');
    if (!toast) {
      const t = document.createElement('div');
      t.id = 'toast';
      t.className = 'toast';
      document.body.appendChild(t);
    }
    const t = document.getElementById('toast');
    t.innerHTML = msg;
    t.style.background = bg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function loadProductsFromStorage(shopId) {
    const saved = localStorage.getItem(`products_${shopId}`);
    if (saved) {
      productsData[shopId] = JSON.parse(saved);
    } else if (!productsData[shopId]) {
      productsData[shopId] = [];
    }
    return productsData[shopId] || [];
  }

  function saveProductsToStorage(shopId) {
    localStorage.setItem(`products_${shopId}`, JSON.stringify(productsData[shopId] || []));
  }

  function addProduct(shopId, product) {
    if (!productsData[shopId]) productsData[shopId] = [];
    const newId = Date.now();
    productsData[shopId].push({
      id: newId,
      name: product.name,
      price: product.price,
      stock: product.stock || 0,
      image: product.image || 'https://images.unsplash.com/-1542838132-92c533f91d2a?w=300&h=200&fit=crop',
      description: product.description || ''
    });
    saveProductsToStorage(shopId);
    updateShopProductCount(shopId);
    return newId;
  }

  function updateProduct(shopId, productId, productData) {
    if (productsData[shopId]) {
      const index = productsData[shopId].findIndex(p => p.id == productId);
      if (index !== -1) {
        productsData[shopId][index] = { ...productsData[shopId][index], ...productData };
        saveProductsToStorage(shopId);
      }
    }
  }

  function deleteProduct(shopId, productId) {
    if (productsData[shopId]) {
      productsData[shopId] = productsData[shopId].filter(p => p.id != productId);
      saveProductsToStorage(shopId);
      updateShopProductCount(shopId);
    }
  }

  function updateShopProductCount(shopId) {
    const savedShops = localStorage.getItem('greenmarket_stores');
    if (savedShops) {
      let shops = JSON.parse(savedShops);
      const shopIndex = shops.findIndex(s => s.id == shopId);
      if (shopIndex !== -1) {
        shops[shopIndex].products = productsData[shopId]?.length || 0;
        localStorage.setItem('greenmarket_stores', JSON.stringify(shops));
      }
    }
  }

  function loadStores() {
    const saved = localStorage.getItem('greenmarket_stores');
    if (saved) return JSON.parse(saved);
    return [];
  }

  let currentShopId = null;
  let editingProductId = null;

  function openProductModal(shopId, productId = null) {
    currentShopId = shopId;
    editingProductId = productId;
    const product = productId ? productsData[shopId]?.find(p => p.id == productId) : null;
    
    document.getElementById('productModalTitle').innerText = product ? '✏️ Modifier le produit' : '➕ Ajouter un produit';
    document.getElementById('productName').value = product?.name || '';
    document.getElementById('productPrice').value = product?.price || '';
    document.getElementById('productStock').value = product?.stock || 0;
    document.getElementById('productDesc').value = product?.description || '';
    
    currentImageDataUrl = null;
    const previewDiv = document.getElementById('imagePreview');
    if (product?.image && product.image !== 'https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop') {
      previewDiv.innerHTML = `<img src="${product.image}" alt="Aperçu"><button class="btn-clear-image" onclick="clearImagePreview()">✕</button>`;
    } else {
      previewDiv.innerHTML = '<div class="preview-placeholder">Haz clic para seleccionar una imagen de tu galería</div>';
    }
    
    const fileInput = document.getElementById('productImageFile');
    if (fileInput) fileInput.value = '';
    
    document.querySelector('input[name="productImageType"][value="file"]').checked = true;
    document.getElementById('productUrlContainer').style.display = 'none';
    document.getElementById('productFileContainer').style.display = 'block';
    
    document.getElementById('productModal').classList.add('open');
  }

  function clearImagePreview() {
    const previewDiv = document.getElementById('imagePreview');
    previewDiv.innerHTML = '<div class="preview-placeholder">Haz clic para seleccionar una imagen de tu galería</div>';
    currentImageDataUrl = null;
    const fileInput = document.getElementById('productImageFile');
    if (fileInput) fileInput.value = '';
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('open');
    editingProductId = null;
    currentShopId = null;
    currentImageDataUrl = null;
  }

  function getProductImage(callback) {
    const imageType = document.querySelector('input[name="productImageType"]:checked').value;
    
    if (currentImageDataUrl) {
      callback(currentImageDataUrl);
      return;
    }
    
    if (imageType === 'url') {
      const url = document.getElementById('productImageUrl').value.trim();
      callback(url || 'https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop');
    } else {
      const file = document.getElementById('productImageFile').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          currentImageDataUrl = event.target.result;
          callback(event.target.result);
        };
        reader.readAsDataURL(file);
      } else {
        const previewImg = document.querySelector('#imagePreview img');
        if (previewImg && previewImg.src && !previewImg.src.includes('placeholder')) {
          callback(previewImg.src);
        } else {
          callback('https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop');
        }
      }
    }
  }

  function saveProduct() {
    const name = document.getElementById('productName').value.trim();
    const price = document.getElementById('productPrice').value.trim();
    const stock = parseInt(document.getElementById('productStock').value) || 0;
    const description = document.getElementById('productDesc').value.trim();
    
    if (!name || !price) {
      showToast("⚠️ Veuillez remplir le nom et le prix", '#9a4a00');
      return;
    }
    
    getProductImage((image) => {
      if (editingProductId) {
        updateProduct(currentShopId, editingProductId, { name, price, stock, image, description });
        showToast("✅ Produit modifié avec succès");
      } else {
        addProduct(currentShopId, { name, price, stock, image, description });
        showToast("✅ Produit ajouté avec succès");
      }
      closeProductModal();
      loadShop();
    });
  }

  function setupProductModalEvents() {
    const radioUrl = document.querySelector('input[name="productImageType"][value="url"]');
    const radioFile = document.querySelector('input[name="productImageType"][value="file"]');
    const urlContainer = document.getElementById('productUrlContainer');
    const fileContainer = document.getElementById('productFileContainer');
    const fileInput = document.getElementById('productImageFile');
    const preview = document.getElementById('imagePreview');
    
    if (radioUrl && radioFile) {
      radioUrl.addEventListener('change', () => {
        urlContainer.style.display = 'block';
        fileContainer.style.display = 'none';
        currentImageDataUrl = null;
      });
      radioFile.addEventListener('change', () => {
        urlContainer.style.display = 'none';
        fileContainer.style.display = 'block';
        currentImageDataUrl = null;
      });
    }
    
    if (fileInput) {
      if (preview) {
        preview.style.cursor = 'pointer';
        preview.addEventListener('click', (e) => {
          if (e.target.classList && e.target.classList.contains('btn-clear-image')) return;
          fileInput.click();
        });
      }
      
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          if (!file.type.startsWith('image/')) {
            showToast("❌ Por favor selecciona una imagen válida (JPG, PNG, GIF)", '#9a4a00');
            fileInput.value = '';
            return;
          }
          
          const reader = new FileReader();
          reader.onload = function(event) {
            currentImageDataUrl = event.target.result;
            preview.innerHTML = `<img src="${event.target.result}" alt="Aperçu"><button class="btn-clear-image" onclick="clearImagePreview()">✕</button>`;
            showToast("📸 Image chargée depuis votre galerie", 'var(--sage)');
          };
          reader.readAsDataURL(file);
        }
      });
    }
    
    const imageUrlInput = document.getElementById('productImageUrl');
    if (imageUrlInput) {
      imageUrlInput.addEventListener('input', (e) => {
        const url = e.target.value.trim();
        if (url && (url.startsWith('http') || url.startsWith('https'))) {
          const preview = document.getElementById('imagePreview');
          preview.innerHTML = `<img src="${url}" alt="Aperçu"><button class="btn-clear-image" onclick="clearImagePreview()">✕</button>`;
        }
      });
    }
  }

  function deleteProductConfirm(shopId, productId) {
    if (confirm("Supprimer ce produit ?")) {
      deleteProduct(shopId, productId);
      loadShop();
      showToast("✅ Produit supprimé");
    }
  }

  function loadShop() {
    currentUser = getCurrentUser();
    const shopId = getShopIdFromURL();

    if (!shopId) {
      const content = document.getElementById('content');
      if(content) content.innerHTML = `<div class="error"><h2>❌ Boutique non spécifiée</h2><a href="store.html" class="btn-back">Retour</a></div>`;
      return;
    }

    let shops = loadStores();
    const shop = shops.find(s => s.id == shopId);

    if (!shop) {
      const content = document.getElementById('content');
      if(content) content.innerHTML = `<div class="error"><h2>❌ Boutique introuvable</h2><a href="store.html" class="btn-back">Retour</a></div>`;
      return;
    }

    const shopProducts = loadProductsFromStorage(shopId);
    const isOwner = (currentUser && currentUser.role === 'productor' && currentUser.producerId == shop.producerId) || (currentUser && currentUser.role === 'admin');

    const bannerImage = shop.banner || 'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=1000&q=80';

    let productsHtml = '';
    if (shopProducts.length === 0) {
      productsHtml = `<div class="empty-products">📦 Aucun produit dans cette boutique pour le moment.</div>`;
    } else {
      productsHtml = `<div class="products-grid">` + shopProducts.map(p => `
        <div class="product-card">
          <div class="product-image">
            <img src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop'">
          </div>
          <div class="product-info">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-price">${escapeHtml(p.price)}</div>
            <div class="product-stock">📦 Stock: ${p.stock || 0}</div>
            <div class="product-actions">
              <button class="btn-add-to-cart" onclick="ajouterAuPanier({id:${p.id}, name:'${escapeHtml(p.name)}', price:'${p.price}', image:'${p.image}'}, ${shop.id}, '${escapeHtml(shop.name)}')">
                🛒 Ajouter au panier
              </button>
              <button class="btn-buy-now" onclick="acheterMaintenant({id:${p.id}, name:'${escapeHtml(p.name)}', price:'${p.price}', image:'${p.image}'}, ${shop.id}, '${escapeHtml(shop.name)}')">
                Acheter
              </button>
              ${isOwner ? `
                <button class="btn-edit" onclick="openProductModal(${shopId}, ${p.id})">✏️</button>
                <button class="btn-delete" onclick="deleteProductConfirm(${shopId}, ${p.id})">🗑️</button>
              ` : ''}
            </div>
          </div>
        </div>
      `).join('') + `</div>`;
    }

    const html = `
      <div class="shop-detail-card">
        <div class="shop-banner"><img src="${bannerImage}" alt="${escapeHtml(shop.name)}"></div>
        <div class="shop-body">
          <div class="shop-title">
            <h1 class="shop-name">${escapeHtml(shop.name)}</h1>
            <div class="shop-category">${escapeHtml(shop.category)}</div>
            <div class="shop-tags">
              ${(shop.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-value">${shop.rating || '4.8'}</span>
              <div class="stars">${starsHtml(shop.rating || 4.8)}</div>
              <span class="stat-label">${shop.reviews || 0} avis</span>
            </div>
            <div class="stat-card">
              <span class="stat-value">${shopProducts.length}</span>
              <span class="stat-label">Produits</span>
            </div>
            <div class="stat-card">
              <span class="stat-value">${shop.sales || '0'}</span>
              <span class="stat-label">Ventes</span>
            </div>
          </div>

          <div class="section">
            <h3>📖 À propos de la boutique</h3>
            <p class="section-desc">${escapeHtml(shop.desc) || 'Aucune description disponible.'}</p>
          </div>

          <div class="section">
            <h3>🛍️ Nos produits</h3>
            ${isOwner ? `<button class="btn-profil" id="openAddProductBtn" style="margin-bottom:1rem; background:var(--wine);">➕ Ajouter un produit</button>` : ''}
            ${productsHtml}
          </div>

          <div class="section">
            <h3>👨‍🌾 Le producteur</h3>
            <div class="producer-card">
              <div class="producer-avatar">
                <div style="width:60px;height:60px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:2rem;">👨‍🌾</div>
              </div>
              <div class="producer-info">
                <div class="producer-name">${escapeHtml(shop.producerName || 'Producteur local')}</div>
                <div class="producer-meta">
                  <span>📍 ${escapeHtml(shop.location || 'Maroc')}</span>
                  <span>📅 Producteur depuis ${shop.since || '2022'}</span>
                </div>
                <div class="producer-bio">Producteur passionné par l'artisanat marocain et la qualité authentique.</div>
                <div class="badge-list">
                  <span class="badge">✓ Vérifié</span>
                  <span class="badge">🏆 Artisan</span>
                </div>
                ${isOwner ? `<a href="dashboard-producteur.html" class="btn-profil btn-dashboard">📊 Accéder à mon tableau de bord</a>` : ''}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="productModal">
        <div class="modal-content">
          <h3 id="productModalTitle">➕ Ajouter un produit</h3>
          <input type="text" id="productName" placeholder="Nom du produit">
          <input type="text" id="productPrice" placeholder="Prix (ex: 5.50 €)">
          <input type="number" id="productStock" placeholder="Stock">
          
          <div class="image-option-group">
            <label><input type="radio" name="productImageType" value="file" checked> 📸 Depuis ma galerie</label>
            <label><input type="radio" name="productImageType" value="url"> 🌐 URL d'image</label>
          </div>
          <div id="productFileContainer" style="display: block;">
            <div id="imagePreview" class="image-preview" style="cursor: pointer;">
              <div class="preview-placeholder">📸 Haz clic aquí para seleccionar una imagen de tu galerie</div>
            </div>
            <input type="file" id="productImageFile" accept="image/*" style="display: none;">
          </div>
          <div id="productUrlContainer" style="display: none;">
            <input type="text" id="productImageUrl" placeholder="https://images.unsplash.com/...">
          </div>
          
          <textarea id="productDesc" placeholder="Description" rows="2"></textarea>
          <div class="modal-actions">
            <button class="btn-save" id="saveProductBtn">💾 Enregistrer</button>
            <button class="btn-cancel" id="cancelProductBtn">Annuler</button>
          </div>
        </div>
      </div>
    `;

    const content = document.getElementById('content');
    if(content) content.innerHTML = html;

    setupProductModalEvents();
    
    if (isOwner) {
      const openBtn = document.getElementById('openAddProductBtn');
      if (openBtn) {
        openBtn.onclick = () => openProductModal(shopId, null);
      }
    }
    
    const saveBtn = document.getElementById('saveProductBtn');
    const cancelBtn = document.getElementById('cancelProductBtn');
    const productModal = document.getElementById('productModal');
    if (saveBtn) saveBtn.onclick = saveProduct;
    if (cancelBtn) cancelBtn.onclick = closeProductModal;
    if (productModal) productModal.onclick = (e) => {
      if (e.target === productModal) closeProductModal();
    };
  }

  window.openProductModal = openProductModal;
  window.deleteProductConfirm = deleteProductConfirm;
  window.closeProductModal = closeProductModal;
  window.ajouterAuPanier = ajouterAuPanier;
  window.acheterMaintenant = acheterMaintenant;
  window.clearImagePreview = clearImagePreview;

  function initAuth() {
    updateAuthUI();
    setupAuthModal();
  }

  mettreAJourCompteurPanier();
  loadHeaderAndInit();
</script>
</body>
</html>
