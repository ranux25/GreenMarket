<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Détail boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#fff9eb;--sage:#9fb2ac;--sage-dark:#7a9490;--sage-light:#c8d8d4;
    --wine:#5d0d18;--wine-dark:#3e0910;--wine-light:#8c2030;--wine-pale:#f5e6e8;
    --text:#2a1a1c;--text-muted:#6b5055;--border:#e8ddd0;--white:#fffdf7;
    --shadow:rgba(93,13,24,.10);--shadow-md:rgba(93,13,24,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

  nav{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--wine);display:flex;align-items:center;gap:.4rem}
  .nav-logo span{color:var(--sage-dark);font-weight:400;font-style:italic}
  .nav-links{display:flex;gap:2rem;align-items:center}
  .nav-links a{text-decoration:none;color:var(--text-muted);font-size:.82rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover{color:var(--wine)}
  .nav-right{display:flex;align-items:center;gap:.8rem}
  .btn-back{background:var(--wine-pale);color:var(--wine);padding:.5rem 1.3rem;border-radius:3px;text-decoration:none;font-size:.78rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;transition:all .2s}
  .btn-back:hover{background:var(--wine);color:var(--cream)}

  .cart-nav-btn{position:relative;background:var(--wine);color:white;border:none;border-radius:3px;padding:.5rem 1.1rem;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:.45rem;transition:background .2s}
  .cart-nav-btn:hover{background:var(--wine-dark)}
  .cart-badge{position:absolute;top:-7px;right:-7px;background:var(--sage-dark);color:white;font-size:.62rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
  .cart-badge.visible{opacity:1;transform:scale(1)}

  .page-header{background:var(--wine);padding:2rem 2.5rem;position:relative;overflow:hidden}
  .page-header::before{content:'';position:absolute;right:-80px;top:-80px;width:420px;height:420px;border:55px solid rgba(255,249,235,.05);border-radius:50%}
  .page-header::after{content:'';position:absolute;left:4%;bottom:-70px;width:240px;height:240px;border:40px solid rgba(159,178,172,.10);border-radius:50%}
  .header-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
  .header-left .header-eyebrow{font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--sage-light);margin-bottom:.9rem}
  .header-left h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;color:var(--cream)}
  .header-left p{color:rgba(255,249,235,.62);font-size:.9rem}

  .container{max-width:1100px;margin:2rem auto;padding:0 1.5rem}

  .shop-detail-card{background:var(--white);border-radius:8px;overflow:hidden;box-shadow:0 20px 40px var(--shadow);border:1.5px solid var(--border)}
  .shop-banner{height:320px;position:relative;overflow:hidden}
  .shop-banner img{width:100%;height:100%;object-fit:cover}
  .shop-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(42,26,28,.4))}
  .shop-body{padding:1.8rem 2rem 2rem}
  .shop-title{margin-bottom:1.5rem}
  .shop-name{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
  .shop-category{display:inline-block;background:var(--sage-light);color:var(--sage-dark);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .8rem;border-radius:3px}
  .shop-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.8rem}
  .tag{background:var(--border);color:var(--text-muted);font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:.18rem .6rem;border-radius:2px}

  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;background:var(--cream);padding:1rem;border-radius:6px;border:1.5px solid var(--border);margin-bottom:2rem}
  .stat-card{text-align:center}
  .stat-value{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--wine);display:block}
  .stat-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em}
  .stars{display:flex;gap:2px;justify-content:center;margin-top:4px}
  .star{color:var(--wine);font-size:.8rem}.star.empty{color:var(--border)}

  .section{margin-bottom:2rem}
  .section h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--border);display:inline-block}
  .section-desc{font-size:.95rem;line-height:1.7;color:var(--text-muted)}

  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;margin-top:1rem}
  .product-card{background:var(--white);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;transition:all .25s ease}
  .product-card:hover{transform:translateY(-4px);border-color:var(--sage);box-shadow:0 8px 20px var(--shadow)}
  .product-image{height:150px;overflow:hidden}
  .product-image img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
  .product-card:hover .product-image img{transform:scale(1.05)}
  .product-info{padding:.8rem}
  .product-name{font-weight:700;color:var(--wine);font-size:.9rem}
  .product-price{font-weight:700;color:var(--sage-dark);margin:.3rem 0;font-size:1rem}
  .product-stock{font-size:.7rem;color:var(--text-muted);margin-bottom:.5rem}
  .product-actions{display:flex;gap:.5rem;margin-top:.5rem}

  .btn-add-cart{flex:1;background:var(--wine);color:white;border:none;padding:.5rem;border-radius:4px;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Jost',sans-serif}
  .btn-add-cart:hover{background:var(--wine-dark);transform:translateY(-1px)}
  .btn-add-cart.added{background:var(--sage-dark);animation:addedPulse .35s ease}
  @keyframes addedPulse{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
  .btn-delete{background:var(--border);color:var(--wine);border:none;padding:.5rem .8rem;border-radius:4px;font-size:.75rem;cursor:pointer;transition:all .2s}
  .btn-delete:hover{background:var(--wine);color:white}
  .btn-edit{background:var(--sage-light);color:var(--sage-dark);border:none;padding:.5rem .8rem;border-radius:4px;font-size:.75rem;cursor:pointer;transition:all .2s}
  .btn-edit:hover{background:var(--sage);color:white}
  .empty-products{text-align:center;padding:2rem;color:var(--text-muted);background:var(--cream);border-radius:8px}

  .producer-card{display:flex;gap:1.2rem;background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:1.2rem;flex-wrap:wrap}
  .producer-info{flex:1}
  .producer-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--text)}
  .producer-meta{font-size:.8rem;color:var(--text-muted);margin:.3rem 0;display:flex;flex-wrap:wrap;gap:1rem}
  .producer-bio{font-size:.85rem;color:var(--text-muted);margin-top:.5rem}
  .badge-list{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap}
  .badge{background:var(--wine-pale);color:var(--wine);font-size:.7rem;padding:.2rem .6rem;border-radius:3px;font-weight:600}
  .btn-profil{margin-top:1rem;background:var(--sage);color:white;border:none;padding:.6rem 1rem;border-radius:3px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;font-size:.8rem;transition:background .2s}
  .btn-profil:hover{background:var(--wine)}
  .btn-dashboard{background:var(--wine);color:white;margin-top:.5rem}
  .btn-dashboard:hover{background:var(--wine-dark)}

  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:1000}
  .modal-overlay.open{display:flex}
  .modal-content{background:var(--white);border-radius:8px;padding:1.5rem;max-width:450px;width:90%;box-shadow:0 20px 40px rgba(0,0,0,.2)}
  .modal-content h3{color:var(--wine);margin-bottom:1rem;font-family:'Cormorant Garamond',serif}
  .modal-content input,.modal-content textarea{width:100%;padding:.7rem;margin-bottom:1rem;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;background:var(--cream)}
  .image-option-group{display:flex;gap:1rem;margin-bottom:1rem}
  .image-option-group label{display:flex;align-items:center;gap:.3rem;font-size:.8rem;cursor:pointer}
  .image-preview{margin-top:.5rem;width:100%;height:100px;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .image-preview img{max-width:100%;max-height:100%;object-fit:contain}
  .modal-actions{display:flex;gap:.8rem;margin-top:.5rem}
  .modal-actions button{flex:1;padding:.6rem;border-radius:3px;border:none;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif}
  .btn-save{background:var(--wine);color:white}
  .btn-cancel{background:var(--border);color:var(--text-muted)}

  .loading,.error{text-align:center;padding:3rem}
  .error{background:var(--wine-pale);border-radius:8px;color:var(--wine)}
  .footer-note{text-align:center;margin-top:3rem;padding:1.5rem;color:var(--text-muted);border-top:1px solid var(--border)}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--wine);color:var(--cream);padding:.85rem 1.5rem;border-radius:5px;font-size:.86rem;font-weight:500;box-shadow:0 8px 28px var(--shadow-md);z-index:9999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.4,.64,1)}
  .toast.show{transform:translateY(0);opacity:1}

  @media(max-width:700px){nav{padding:0 1rem}.nav-links{display:none}.container{padding:0 1rem}.shop-body{padding:1rem}.stats-grid{grid-template-columns:repeat(2,1fr)}.shop-banner{height:220px}.products-grid{grid-template-columns:1fr}.shop-name{font-size:1.6rem}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🌿 Green<span>Market</span></div>
  <div class="nav-links">
    <a href="store.html">Accueil</a>
    <a href="store.html">Boutiques</a>
    <a href="#">Produits</a>
    <a href="#">À propos</a>
  </div>
  <div class="nav-right">
    <a href="panier.html" class="cart-nav-btn" id="cartNavBtn">
      🛒 Panier
      <span class="cart-badge" id="cartBadge">0</span>
    </a>
    <a href="store.html" class="btn-back">← Retour</a>
  </div>
</nav>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">🌱 DÉCOUVREZ CETTE BOUTIQUE</div>
      <h1>Détail de la<br>boutique</h1>
      <p>Tous les produits et informations du producteur</p>
    </div>
  </div>
</div>

<div class="container">
  <div id="content"><div class="loading">Chargement des informations...</div></div>
</div>
<div class="footer-note">🌿 GreenMarket – Mettre en valeur les producteurs locaux</div>

<script>
  // ===== PANIER =====
  function getCart(){ return JSON.parse(localStorage.getItem('greenmarket_cart')||'[]'); }
  function saveCart(cart){ localStorage.setItem('greenmarket_cart',JSON.stringify(cart)); }
  function addToCart(product, shopId, shopName){
    const cart = getCart();
    const ex = cart.find(i => i.id === product.id && i.shopId == shopId);
    if(ex){ ex.quantity = (ex.quantity||1)+1; }
    else { cart.push({ id:product.id, name:product.name, price:product.price, image:product.image, stock:product.stock||99, shopId:shopId, shopName:shopName, quantity:1 }); }
    saveCart(cart);
    updateCartBadge();
  }
  function getCartCount(){ return getCart().reduce((s,i)=>s+(i.quantity||1),0); }
  function updateCartBadge(){
    const count = getCartCount();
    const badge = document.getElementById('cartBadge');
    if(!badge) return;
    badge.textContent = count;
    count>0 ? badge.classList.add('visible') : badge.classList.remove('visible');
  }

  // ===== UTILS =====
  let currentUser=null, productsData={};
  function getCurrentUser(){ const u=sessionStorage.getItem('greenmarket_current_user'); return u?JSON.parse(u):null; }
  function escapeHtml(str){ if(!str)return''; return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  function getShopIdFromURL(){ return new URLSearchParams(window.location.search).get('id'); }
  function starsHtml(rating){ let s=''; for(let i=0;i<5;i++) s+=`<span class="star${i<Math.floor(rating)?'':' empty'}">★</span>`; return s; }
  function showToast(msg, bg='var(--wine)'){
    let t=document.getElementById('toast');
    if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
    t.innerHTML=msg; t.style.background=bg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2800);
  }

  // ===== STORAGE PRODUITS =====
  function loadProductsFromStorage(shopId){
    const saved=localStorage.getItem(`products_${shopId}`);
    if(saved) productsData[shopId]=JSON.parse(saved);
    else if(!productsData[shopId]) productsData[shopId]=[];
    return productsData[shopId]||[];
  }
  function saveProductsToStorage(shopId){ localStorage.setItem(`products_${shopId}`,JSON.stringify(productsData[shopId]||[])); }
  function addProduct(shopId,product){
    if(!productsData[shopId]) productsData[shopId]=[];
    const newId=Date.now();
    productsData[shopId].push({id:newId,name:product.name,price:product.price,stock:product.stock||0,image:product.image||'https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop',description:product.description||''});
    saveProductsToStorage(shopId); updateShopProductCount(shopId); return newId;
  }
  function updateProduct(shopId,productId,productData){
    if(productsData[shopId]){ const i=productsData[shopId].findIndex(p=>p.id==productId); if(i!==-1){productsData[shopId][i]={...productsData[shopId][i],...productData};saveProductsToStorage(shopId);} }
  }
  function deleteProduct(shopId,productId){
    if(productsData[shopId]){productsData[shopId]=productsData[shopId].filter(p=>p.id!=productId);saveProductsToStorage(shopId);updateShopProductCount(shopId);}
  }
  function updateShopProductCount(shopId){
    const saved=localStorage.getItem('greenmarket_stores');
    if(saved){let shops=JSON.parse(saved);const i=shops.findIndex(s=>s.id==shopId);if(i!==-1){shops[i].products=productsData[shopId]?.length||0;localStorage.setItem('greenmarket_stores',JSON.stringify(shops));}}
  }
  function loadStores(){ return JSON.parse(localStorage.getItem('greenmarket_stores')||'[]'); }
  function loadCategories(){
    const saved=localStorage.getItem('greenmarket_categories');
    return saved?JSON.parse(saved):[{id:1,name:'Fruits et légumes'},{id:2,name:'Produits laitiers'},{id:3,name:'Boulangerie artisanale'},{id:4,name:'Miel et apiculture'},{id:5,name:'Huiles et conserves'},{id:6,name:'Plantes médicinales'}];
  }

  // ===== MODAL PRODUIT =====
  let currentShopId=null, editingProductId=null;
  function openProductModal(shopId,productId=null){
    currentShopId=shopId; editingProductId=productId;
    const product=productId?productsData[shopId]?.find(p=>p.id==productId):null;
    document.getElementById('productModalTitle').innerText=product?'✏️ Modifier le produit':'➕ Ajouter un produit';
    document.getElementById('productName').value=product?.name||'';
    document.getElementById('productPrice').value=product?.price||'';
    document.getElementById('productStock').value=product?.stock||0;
    document.getElementById('productImageUrl').value=product?.image||'';
    document.getElementById('productDesc').value=product?.description||'';
    document.getElementById('productImageFile').value='';
    document.getElementById('imagePreview').innerHTML=product?.image?`<img src="${product.image}" alt="Aperçu">`:'<div>Aucune image</div>';
    document.querySelector('input[name="productImageType"][value="url"]').checked=true;
    document.getElementById('productUrlContainer').style.display='block';
    document.getElementById('productFileContainer').style.display='none';
    document.getElementById('productModal').classList.add('open');
  }
  function closeProductModal(){document.getElementById('productModal').classList.remove('open');editingProductId=null;currentShopId=null;}
  function getProductImage(callback){
    const type=document.querySelector('input[name="productImageType"]:checked').value;
    if(type==='url'){callback(document.getElementById('productImageUrl').value.trim()||'https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop');}
    else{const f=document.getElementById('productImageFile').files[0];if(f){const r=new FileReader();r.onload=e=>callback(e.target.result);r.readAsDataURL(f);}else callback('https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop');}
  }
  function saveProduct(){
    const name=document.getElementById('productName').value.trim();
    const price=document.getElementById('productPrice').value.trim();
    const stock=parseInt(document.getElementById('productStock').value)||0;
    const description=document.getElementById('productDesc').value.trim();
    if(!name||!price){showToast("⚠️ Veuillez remplir le nom et le prix",'#9a4a00');return;}
    getProductImage((image)=>{
      if(editingProductId){updateProduct(currentShopId,editingProductId,{name,price,stock,image,description});showToast("✅ Produit modifié");}
      else{addProduct(currentShopId,{name,price,stock,image,description});showToast("✅ Produit ajouté");}
      closeProductModal();loadShop();
    });
  }
  function setupProductModalEvents(){
    const rUrl=document.querySelector('input[name="productImageType"][value="url"]');
    const rFile=document.querySelector('input[name="productImageType"][value="file"]');
    const uC=document.getElementById('productUrlContainer');
    const fC=document.getElementById('productFileContainer');
    const fi=document.getElementById('productImageFile');
    const prev=document.getElementById('imagePreview');
    if(rUrl) rUrl.addEventListener('change',()=>{uC.style.display='block';fC.style.display='none';});
    if(rFile) rFile.addEventListener('change',()=>{uC.style.display='none';fC.style.display='block';});
    if(fi) fi.addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{prev.innerHTML=`<img src="${ev.target.result}" alt="Aperçu">`;};r.readAsDataURL(f);}else prev.innerHTML='<div>Aucune image</div>';});
  }
  function deleteProductConfirm(shopId,productId){if(confirm("Supprimer ce produit ?")){deleteProduct(shopId,productId);loadShop();showToast("✅ Produit supprimé");}}

  // ===== ADD TO CART HANDLER =====
  function handleAddToCart(product, shopId, shopName, btn){
    addToCart(product, shopId, shopName);
    btn.textContent='✓ Ajouté !';
    btn.classList.add('added');
    showToast(`🛒 <strong>${escapeHtml(product.name)}</strong> ajouté au panier`,'var(--sage-dark)');
    setTimeout(()=>{btn.textContent='🛒 Ajouter au panier';btn.classList.remove('added');},1800);
  }

  // ===== CHARGEMENT PAGE =====
  function loadShop(){
    currentUser=getCurrentUser();
    const shopId=getShopIdFromURL();
    if(!shopId){document.getElementById('content').innerHTML='<div class="error"><h2>❌ Boutique non spécifiée</h2></div>';return;}
    const shops=loadStores(), categories=loadCategories();
    const shop=shops.find(s=>s.id==shopId);
    if(!shop){document.getElementById('content').innerHTML='<div class="error"><h2>❌ Boutique introuvable</h2></div>';return;}
    const category=categories.find(c=>c.id===shop.categoryId);
    const shopProducts=loadProductsFromStorage(shopId);
    const isOwner=(currentUser&&currentUser.role==='productor'&&currentUser.producerId===shop.producerId)||(currentUser&&currentUser.role==='admin');
    const bannerImage=shop.banner||'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=1000&q=80';

    let productsHtml='';
    if(shopProducts.length===0){
      productsHtml='<div class="empty-products">📦 Aucun produit dans cette boutique pour le moment.</div>';
    } else {
      productsHtml='<div class="products-grid">'+shopProducts.map(p=>`
        <div class="product-card">
          <div class="product-image">
            <img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.name)}" loading="lazy"
                 onerror="this.src='https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=300&h=200&fit=crop'">
          </div>
          <div class="product-info">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-price">${escapeHtml(p.price)}</div>
            <div class="product-stock">📦 Stock: ${p.stock||0}</div>
            <div class="product-actions">
              <button class="btn-add-cart"
                onclick='handleAddToCart(${JSON.stringify(p)},${shopId},"${escapeHtml(shop.name)}",this)'>
                🛒 Ajouter au panier
              </button>
              ${isOwner?`
                <button class="btn-edit" onclick="openProductModal(${shopId},${p.id})">✏️</button>
                <button class="btn-delete" onclick="deleteProductConfirm(${shopId},${p.id})">🗑️</button>
              `:''}
            </div>
          </div>
        </div>
      `).join('')+'</div>';
    }

    document.getElementById('content').innerHTML=`
      <div class="shop-detail-card">
        <div class="shop-banner"><img src="${bannerImage}" alt="${escapeHtml(shop.name)}"></div>
        <div class="shop-body">
          <div class="shop-title">
            <h1 class="shop-name">${escapeHtml(shop.name)}</h1>
            <div class="shop-category">${category?escapeHtml(category.name):shop.category||'Boutique'}</div>
            <div class="shop-tags">${(shop.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><span class="stat-value">${shop.rating||'4.8'}</span><div class="stars">${starsHtml(shop.rating||4.8)}</div><span class="stat-label">${shop.reviews||0} avis</span></div>
            <div class="stat-card"><span class="stat-value">${shopProducts.length}</span><span class="stat-label">Produits</span></div>
            <div class="stat-card"><span class="stat-value">${shop.sales||'0'}</span><span class="stat-label">Ventes</span></div>
          </div>
          <div class="section">
            <h3>📖 À propos de la boutique</h3>
            <p class="section-desc">${escapeHtml(shop.desc)||'Aucune description disponible.'}</p>
          </div>
          <div class="section">
            <h3>🛍️ Nos produits</h3>
            ${isOwner?`<button class="btn-profil" id="openAddProductBtn" style="margin-bottom:1rem;background:var(--wine);">➕ Ajouter un produit</button>`:''}
            ${productsHtml}
          </div>
          <div class="section">
            <h3>👨‍🌾 Le producteur</h3>
            <div class="producer-card">
              <div style="width:60px;height:60px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;">👨‍🌾</div>
              <div class="producer-info">
                <div class="producer-name">${escapeHtml(shop.producerName||'Producteur local')}</div>
                <div class="producer-meta"><span>📍 ${escapeHtml(shop.location||'France')}</span><span>📅 Producteur depuis ${shop.since||'2022'}</span></div>
                <div class="producer-bio">Producteur passionné par les produits du terroir et la qualité artisanale.</div>
                <div class="badge-list"><span class="badge">✓ Vérifié</span><span class="badge">🏆 Artisan</span></div>
                <a href="profil-producteur.html?id=${shop.producerId}" class="btn-profil">👤 Voir le profil complet →</a>
                ${isOwner?`<a href="dashboard-producteur.html" class="btn-profil btn-dashboard">📊 Accéder à mon tableau de bord</a>`:''}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="productModal">
        <div class="modal-content">
          <h3 id="productModalTitle">➕ Ajouter un produit</h3>
          <input type="text" id="productName" placeholder="Nom du produit">
          <input type="text" id="productPrice" placeholder="Prix (ex: 5.50 €)">
          <input type="number" id="productStock" placeholder="Stock">
          <div class="image-option-group">
            <label><input type="radio" name="productImageType" value="url" checked> 🌐 URL</label>
            <label><input type="radio" name="productImageType" value="file"> 📁 Fichier</label>
          </div>
          <div id="productUrlContainer"><input type="text" id="productImageUrl" placeholder="https://..."></div>
          <div id="productFileContainer" style="display:none;"><input type="file" id="productImageFile" accept="image/*"><div id="imagePreview" class="image-preview"><div>Aucune image</div></div></div>
          <textarea id="productDesc" placeholder="Description" rows="2"></textarea>
          <div class="modal-actions">
            <button class="btn-save" id="saveProductBtn">Enregistrer</button>
            <button class="btn-cancel" id="cancelProductBtn">Annuler</button>
          </div>
        </div>
      </div>
    `;

    setupProductModalEvents();
    if(isOwner){const b=document.getElementById('openAddProductBtn');if(b)b.onclick=()=>openProductModal(shopId,null);}
    const sb=document.getElementById('saveProductBtn');
    const cb=document.getElementById('cancelProductBtn');
    const pm=document.getElementById('productModal');
    if(sb)sb.onclick=saveProduct;
    if(cb)cb.onclick=closeProductModal;
    if(pm)pm.onclick=e=>{if(e.target===pm)closeProductModal();};
  }

  window.openProductModal=openProductModal;
  window.deleteProductConfirm=deleteProductConfirm;
  window.closeProductModal=closeProductModal;
  window.handleAddToCart=handleAddToCart;
  window.showToast=showToast;

  updateCartBadge();
  loadShop();
</script>
</body>
</html>
