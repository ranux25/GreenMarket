<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>GreenMarket – Détail boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
<style>
  :root {
    --cream:      #fff9eb;
    --sage:       #9fb2ac;
    --sage-dark:  #7a9490;
    --sage-light: #c8d8d4;
    --wine:       #5d0d18;
    --wine-dark:  #3e0910;
    --wine-light: #8c2030;
    --wine-pale:  #f5e6e8;
    --text:       #2a1a1c;
    --text-muted: #6b5055;
    --border:     #e8ddd0;
    --white:      #fffdf7;
    --shadow:     rgba(93,13,24,.10);
    --shadow-md:  rgba(93,13,24,.18);
    --primary: #5D0D18;
    --secondary: #9FB2AC;
    --bg: #FFF9EB;
    --text-dark: #2C2C2C;
    --text-light: #6B6B6B;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  #header-placeholder { width: 100%; }

  .btn-back {
    background: var(--wine-pale);
    color: var(--wine);
    padding: 0.5rem 1.3rem;
    border-radius: 3px;
    text-decoration: none;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-back:hover {
    background: var(--wine);
    color: var(--cream);
  }

  .page-header {
    background: var(--wine);
    padding: 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    right: -80px;
    top: -80px;
    width: 420px;
    height: 420px;
    border: 55px solid rgba(255,249,235,.05);
    border-radius: 50%;
  }
  .page-header::after {
    content: '';
    position: absolute;
    left: 4%;
    bottom: -70px;
    width: 240px;
    height: 240px;
    border: 40px solid rgba(159,178,172,.10);
    border-radius: 50%;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left .header-eyebrow {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: .9rem;
  }
  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--cream);
  }
  .header-left p {
    color: rgba(255,249,235,.62);
    font-size: .9rem;
  }

  .container {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .shop-detail-card {
    background: var(--white);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 40px var(--shadow);
    border: 1.5px solid var(--border);
  }

  .shop-banner {
    height: 320px;
    position: relative;
    overflow: hidden;
  }
  .shop-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .shop-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(42,26,28,.4));
  }

  .shop-body {
    padding: 1.8rem 2rem 2rem;
  }

  .shop-title {
    margin-bottom: 1.5rem;
  }
  .shop-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .shop-category {
    display: inline-block;
    background: var(--sage-light);
    color: var(--sage-dark);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.8rem;
    border-radius: 3px;
  }
  .shop-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.8rem;
  }
  .tag {
    background: var(--border);
    color: var(--text-muted);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.18rem 0.6rem;
    border-radius: 2px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    background: var(--cream);
    padding: 1rem;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    margin-bottom: 2rem;
  }
  .stat-card {
    text-align: center;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--wine);
    display: block;
  }
  .stat-label {
    font-size: .7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .stars {
    display: flex;
    gap: 2px;
    justify-content: center;
    margin-top: 4px;
  }
  .star { color: var(--wine); font-size: .8rem; }
  .star.empty { color: var(--border); }

  .section {
    margin-bottom: 2rem;
  }
  .section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--border);
    display: inline-block;
  }
  .section-desc {
    font-size: .95rem;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
    margin-top: 1rem;
  }
  .product-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.25s ease;
  }
  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--sage);
    box-shadow: 0 8px 20px var(--shadow);
  }
  .product-image {
    height: 150px;
    overflow: hidden;
  }
  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .product-card:hover .product-image img {
    transform: scale(1.05);
  }
  .product-info {
    padding: 0.8rem;
  }
  .product-name {
    font-weight: 700;
    color: var(--wine);
    font-size: 0.9rem;
  }
  .product-price {
    font-weight: 700;
    color: var(--sage-dark);
    margin: 0.3rem 0;
    font-size: 1rem;
  }
  .product-stock {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .product-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .btn-add-to-cart {
    flex: 2;
    background: var(--sage);
    color: white;
    border: none;
    padding: 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add-to-cart:hover {
    background: var(--wine);
  }
  .btn-buy-now {
    flex: 1;
    background: var(--wine);
    color: white;
    border: none;
    padding: 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-buy-now:hover {
    background: var(--wine-dark);
  }

  .producer-card {
    display: flex;
    gap: 1.2rem;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    flex-wrap: wrap;
  }
  .producer-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .producer-info {
    flex: 1;
  }
  .producer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }
  .producer-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin: 0.3rem 0;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .producer-bio {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .badge-list {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--wine-pale);
    color: var(--wine);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    font-weight: 600;
  }

  .empty-products {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    background: var(--cream);
    border-radius: 8px;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--wine);
    color: var(--cream);
    padding: .85rem 1.5rem;
    border-radius: 5px;
    font-size: .86rem;
    font-weight: 500;
    box-shadow: 0 8px 28px var(--shadow-md);
    z-index: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all .35s cubic-bezier(.34,1.4,.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .btn-connexion {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 8px 20px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
    text-decoration: none;
    display: inline-block;
  }
  .btn-connexion:hover {
    background: #7a1020;
    transform: translateY(-1px);
  }

  .user-badge {
    background: var(--wine-pale);
    padding: 0.4rem 1rem;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--wine);
    font-weight: 600;
    font-size: 0.85rem;
  }

  @media (max-width: 700px) {
    .container { padding: 0 1rem; }
    .shop-body { padding: 1rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .shop-banner { height: 220px; }
    .products-grid { grid-template-columns: 1fr; }
    .shop-name { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">🌱 DÉCOUVREZ CETTE BOUTIQUE</div>
      <h1>Détail de la<br>boutique</h1>
      <p>Tous les produits et informations du producteur</p>
    </div>
    <a href="store.html" class="btn-back">← Retour aux boutiques</a>
  </div>
</div>

<div class="container">

</div>

  🌿 GreenMarket – Mettre en valeur les producteurs locaux
</div>

<script>
  // ========== PRODUCTOS GLOBALES (mismos que en produits.html) ==========

    { id: 103, name: "Caftan Moderne", price: "600 DH", stock: 8, image: "IMAGES/CaftanModerne.jpg", description: "Caftan à la coupe contemporaine, idéal pour les occasions spéciales.", shopId: 1, shopName: "Maison du Caftan", category: "Caftans & Vêtements traditionnels" },
    { id: 201, name: "Tapis Berbère Moyen", price: "1 200 DH", stock: 4, image: "IMAGES/img/tapis.jpeg", description: "Tapis en laine naturelle, motifs berbères authentiques.", shopId: 2, shopName: "Tapis Berbère d'Atlas", category: "Tapis & Tissage" },
    { id: 202, name: "Tapis Azilal", price: "950 DH", stock: 6, image: "IMAGES/img/tapisBerbere.jpeg", description: "Tapis coloré des montagnes d'Azilal, motifs géométriques uniques.", shopId: 9, shopName: "Tissage d'Azilal", category: "Tapis & Tissage" },
    { id: 301, name: "Tajine Traditionnel", price: "180 DH", stock: 20, image: "IMAGES/img/tajin.jpeg", description: "Tajine en terre cuite, motif peint à la main.", shopId: 3, shopName: "Poterie de Safi", category: "Poterie & Céramique" },
    { id: 401, name: "Petite Table Marqueterie", price: "850 DH", stock: 4, image: "IMAGES/img/table.webp", description: "Table en cèdre incrusté, marqueterie fine.", shopId: 4, shopName: "Marqueterie de Tetouan", category: "Marqueterie & Bois" },
    { id: 501, name: "Bracelet Argent Amazigh", price: "450 DH", stock: 10, image: "IMAGES/img/accesorio.jpeg", description: "Bracelet en argent, symbole amazigh.", shopId: 5, shopName: "Bijoux Amaziagh", category: "Bijoux & Joaillerie" },
    { id: 601, name: "Lanterne Laiton", price: "380 DH", stock: 8, image: "IMAGES/img/luz.jpeg", description: "Lanterne en laiton martelé, ambiance orientale.", shopId: 6, shopName: "Lumières de Marrakech", category: "Lampes & Fer forgé" },
    { id: 701, name: "Huile d'Argan Bio", price: "120 DH", stock: 50, image: "IMAGES/img/argan.jpg", description: "Huile d'argan 100% pure, certifiée bio.", shopId: 7, shopName: "Argamane Naturel", category: "Cosmétiques naturels" },
    { id: 801, name: "Huile d'Olive Vierge", price: "85 DH", stock: 40, image: "IMAGES/img/vierge.jpeg", description: "Huile d'olive extra vierge, première pression.", shopId: 8, shopName: "Saveurs du Terroir", category: "Produits du terroir" },
    { id: 802, name: "Amlou", price: "95 DH", stock: 25, image: "IMAGES/img/amlou.jpeg", description: "Purée d'amandes et miel d'argan, délice marocain.", shopId: 8, shopName: "Saveurs du Terroir", category: "Produits du terroir" }
  ];

  // ========== TIENDAS ==========
  let stores = [];

  function loadStores() {
    const saved = localStorage.getItem('greenmarket_stores');
    if (saved && JSON.parse(saved).length > 0) {
      stores = JSON.parse(saved);
    } else {
      stores = [
        { id:1, name:"Maison du Caftan", category:"Caftans & Vêtements traditionnels", badge:"Artisan", banner:"IMAGES/1779140603090.png", desc:"Caftans de luxe en soie et tissus traditionnels, broderies faites main par des maîtres-artisans de Fès.", rating:4.9, reviews:234, products:8, sales:"2 450", producerName:"Fatima Zahra", location:"Fès", since:"2005", producerId:101 },
        { id:2, name:"Tapis Berbère d'Atlas", category:"Tapis & Tissage", badge:"Tradition", banner:"IMAGES/1779140612922.png", desc:"Tapis berbères authentiques tissés à la main par les femmes de l'Atlas, chaque pièce est unique.", rating:4.8, reviews:189, products:6, sales:"3 200", producerName:"Rachid El Mansouri", location:"Marrakech", since:"2010", producerId:102 },
        { id:3, name:"Poterie de Safi", category:"Poterie & Céramique", badge:"Fait Main", banner:"IMAGES/1779140622713.png", desc:"Poterie traditionnelle de Safi, plats, tajines et vases peints à la main.", rating:4.7, reviews:156, products:12, sales:"1 890", producerName:"Ahmed Benjelloun", location:"Safi", since:"1998", producerId:103 },
        { id:4, name:"Marqueterie de Tetouan", category:"Marqueterie & Bois", badge:"Artisan", banner:"IMAGES/1779140702263.png", desc:"Meubles et objets en bois de cèdre incrustés, marqueterie fine.", rating:4.9, reviews:112, products:5, sales:"980", producerName:"Mohamed Alami", location:"Tetouan", since:"2012", producerId:104 },
        { id:5, name:"Bijoux Amaziagh", category:"Bijoux & Joaillerie", badge:"Tradition", banner:"IMAGES/1779140781327.png", desc:"Bijoux en argent massif inspirés des symboles amazighs.", rating:4.9, reviews:203, products:15, sales:"2 100", producerName:"Malika Oufkir", location:"Agadir", since:"2008", producerId:105 },
        { id:6, name:"Lumières de Marrakech", category:"Lampes & Fer forgé", badge:"Fait Main", banner:"IMAGES/1779140836694.png", desc:"Lampes en fer forgé, lanternes en laiton traditionnelles.", rating:4.6, reviews:98, products:9, sales:"1 450", producerName:"Karim Tazi", location:"Marrakech", since:"2015", producerId:106 },
        { id:7, name:"Argamane Naturel", category:"Cosmétiques naturels", badge:"Artisan", banner:"IMAGES/1779140886747.png", desc:"Savons à l'huile d'argan, ghassoul, huiles essentielles.", rating:4.8, reviews:178, products:11, sales:"890", producerName:"Nadia Berrada", location:"Essaouira", since:"2017", producerId:107 },
        { id:8, name:"Saveurs du Terroir", category:"Produits du terroir", badge:"Tradition", banner:"IMAGES/1779140962074.png", desc:"Huile d'olive, amlou, miel de montagne, épices artisanales.", rating:4.7, reviews:145, products:20, sales:"3 500", producerName:"Hassan El Fassi", location:"Meknès", since:"2000", producerId:108 },
        { id:9, name:"Tissage d'Azilal", category:"Tapis & Tissage", badge:"Fait Main", banner:"IMAGES/1779141008846.png", desc:"Couvertures, tapis et tissages colorés des montagnes d'Azilal.", rating:4.8, reviews:87, products:7, sales:"670", producerName:"Zineb Ait Ali", location:"Azilal", since:"2019", producerId:109 },
        { id:10, name:"Caftans Impériaux", category:"Caftans & Vêtements traditionnels", badge:"Artisan", banner:"IMAGES/1779141052204.png", desc:"Caftans de cérémonie, takchitas pour grandes occasions.", rating:4.9, reviews:256, products:10, sales:"4 200", producerName:"Leila Benani", location:"Casablanca", since:"2006", producerId:110 }
      ];
    }
    return stores;
  }

  // ========== FUNCIONES DEL CARRITO ==========
  function getPanier() {
    const saved = localStorage.getItem('greenmarket_cart');
    return saved ? JSON.parse(saved) : [];
  }

  function savePanier(panier) {
    localStorage.setItem('greenmarket_cart', JSON.stringify(panier));
    updateCartCount();
  }

  function updateCartCount() {
    const panier = getPanier();
    const total = panier.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cart-count');
    if (badge) badge.textContent = total;
  }

  function addToCart(product, shopId, shopName) {
    let panier = getPanier();
    const existing = panier.find(p => p.id === product.id);
    
    let prixNumerique = parseInt(product.price.replace(/\D/g, '')) || 0;
    
    if (existing) {
      existing.quantity = (existing.quantity || 1) + 1;
    } else {
      panier.push({
        id: product.id,
        name: product.name,
        price: product.price,
        prixNumerique: prixNumerique,
        image: product.image,
        boutiqueId: shopId,
        boutiqueNom: shopName,
        quantity: 1
      });
    }
    
    savePanier(panier);
    showToast(`✅ ${product.name} ajouté au panier`);
  }

  function buyNow(product, shopId, shopName) {
    let panier = [];
    let prixNumerique = parseInt(product.price.replace(/\D/g, '')) || 0;
    
    panier.push({
      id: product.id,
      name: product.name,
      price: product.price,
      prixNumerique: prixNumerique,
      image: product.image,
      boutiqueId: shopId,
      boutiqueNom: shopName,
      quantity: 1
    });
    
    savePanier(panier);
    
    const productsForCheckout = panier.map(p => ({
      id: p.id,
      name: p.name,
      price: p.price,
      image: p.image,
      quantity: p.quantity,
      boutiqueId: p.boutiqueId,
      boutiqueNom: p.boutiqueNom
    }));
    
    const encoded = encodeURIComponent(JSON.stringify(productsForCheckout));
    window.location.href = `checkout.html?products=${encoded}`;
  }

  // ========== AUTENTICACIÓN ==========
  let currentUser = null;

  function getCurrentUser() {
    const u = sessionStorage.getItem('greenmarket_current_user');
    return u ? JSON.parse(u) : null;
  }

  function logout() {
    sessionStorage.removeItem('greenmarket_current_user');
    currentUser = null;
    updateAuthUI();
    showToast("👋 Déconnexion réussie");
    setTimeout(() => window.location.reload(), 500);
  }

  function updateAuthUI() {
    const widget = document.getElementById('authWidget');
    if (!widget) return;
    
    const user = getCurrentUser();
    if (user) {
      const roleText = user.role === 'admin' ? 'Admin' : (user.role === 'productor' ? 'Artisan' : 'Client');
      widget.innerHTML = `<div class="user-badge">👋 ${escapeHtml(user.name)} (${roleText})<button id="logoutBtn" style="background:none;border:none;color:#5d0d18;cursor:pointer;margin-left:8px;">🚪</button></div>`;
      document.getElementById('logoutBtn')?.addEventListener('click', logout);
    } else {
      widget.innerHTML = `<a href="signin.html"><button class="btn-connexion">🔑 Connexion</button></a>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  function showToast(msg, bg = 'var(--wine)') {
    let toast = document.getElementById('toast');
    if (!toast) {
      const t = document.createElement('div');
      t.id = 'toast';
      t.className = 'toast';
      document.body.appendChild(t);
    }
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = bg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function starsHtml(rating) {
    let full = Math.floor(rating);
    let stars = '';
    for (let i = 0; i < 5; i++) {
      if (i < full) stars += '<span class="star">★</span>';
      else stars += '<span class="star empty">★</span>';
    }
    return stars;
  }

  function getShopIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  function renderShopDetail() {
    const shopId = parseInt(getShopIdFromURL());
    
    if (!shopId) {
      document.getElementById('content').innerHTML = `<div class="error"><h2>❌ Boutique non spécifiée</h2><a href="store.html" class="btn-back">Retour</a></div>`;
      return;
    }

    const shop = stores.find(s => s.id === shopId);
    
    if (!shop) {
      document.getElementById('content').innerHTML = `<div class="error"><h2>❌ Boutique introuvable</h2><a href="store.html" class="btn-back">Retour</a></div>`;
      return;
    }

    // Filtrar productos que pertenecen a esta tienda
    const shopProducts = allProducts.filter(p => p.shopId === shopId);
    
    let productsHtml = '';
    if (shopProducts.length === 0) {
      productsHtml = `<div class="empty-products">📦 Aucun produit dans cette boutique pour le moment.</div>`;
    } else {
      productsHtml = `<div class="products-grid">` + shopProducts.map(p => `
        <div class="product-card">
          <div class="product-image">
            <img src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://placehold.co/300x200?text=Produit'">
          </div>
          <div class="product-info">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-price">${escapeHtml(p.price)}</div>
            <div class="product-stock">📦 Stock: ${p.stock}</div>
            <div class="product-actions">
              <button class="btn-add-to-cart" onclick="addToCart({id:${p.id}, name:'${escapeHtml(p.name)}', price:'${p.price}', image:'${p.image}'}, ${shop.id}, '${escapeHtml(shop.name)}')">
                🛒 Ajouter au panier
              </button>
              <button class="btn-buy-now" onclick="buyNow({id:${p.id}, name:'${escapeHtml(p.name)}', price:'${p.price}', image:'${p.image}'}, ${shop.id}, '${escapeHtml(shop.name)}')">
                Acheter
              </button>
            </div>
          </div>
        </div>
      `).join('') + `</div>`;
    }

    const html = `
      <div class="shop-detail-card">
        <div class="shop-banner">
          <img src="${shop.banner}" alt="${escapeHtml(shop.name)}" onerror="this.src='https://placehold.co/1000x400?text=Boutique'">
        </div>
        <div class="shop-body">
          <div class="shop-title">
            <h1 class="shop-name">${escapeHtml(shop.name)}</h1>
            <div class="shop-category">${escapeHtml(shop.category)}</div>
            <div class="shop-tags">
              <span class="tag">${escapeHtml(shop.badge || 'Artisan')}</span>
              <span class="tag">📍 ${escapeHtml(shop.location || 'Maroc')}</span>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-value">${shop.rating || '4.8'}</span>
              <div class="stars">${starsHtml(shop.rating || 4.8)}</div>
              <span class="stat-label">${shop.reviews || 0} avis</span>
            </div>
            <div class="stat-card">
              <span class="stat-value">${shopProducts.length}</span>
              <span class="stat-label">Produits</span>
            </div>
            <div class="stat-card">
              <span class="stat-value">${shop.sales || '0'}</span>
              <span class="stat-label">Ventes</span>
            </div>
          </div>

          <div class="section">
            <h3>📖 À propos de la boutique</h3>
            <p class="section-desc">${escapeHtml(shop.desc) || 'Aucune description disponible.'}</p>
          </div>

          <div class="section">
            <h3>🛍️ Nos produits</h3>
            ${productsHtml}
          </div>

          <div class="section">
            <h3>👨‍🌾 Le producteur</h3>
            <div class="producer-card">
              <div class="producer-avatar">
                <div style="width:60px;height:60px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:2rem;">👨‍🌾</div>
              </div>
              <div class="producer-info">
                <div class="producer-name">${escapeHtml(shop.producerName || 'Producteur local')}</div>
                <div class="producer-meta">
                  <span>📍 ${escapeHtml(shop.location || 'Maroc')}</span>
                  <span>📅 Producteur depuis ${shop.since || '2022'}</span>
                </div>
                <div class="producer-bio">Producteur passionné par l'artisanat marocain et la qualité authentique.</div>
                <div class="badge-list">
                  <span class="badge">✓ Vérifié</span>
                  <span class="badge">🏆 Artisan</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('content').innerHTML = html;
  }

  // ========== CARGAR HEADER ==========
  async function loadHeaderAndInit() {
    try {
      const response = await fetch('header.html');
      if (!response.ok) throw new Error('Error cargando header');
      const headerHtml = await response.text();
      document.getElementById('header-placeholder').innerHTML = headerHtml;
      
      setTimeout(() => {
        loadStores();
        updateCartCount();
        updateAuthUI();
        renderShopDetail();
      }, 100);
    } catch (error) {
      console.error('Error:', error);
      loadStores();
      updateCartCount();
      updateAuthUI();
      renderShopDetail();
    }
  }

  window.addToCart = addToCart;
  window.buyNow = buyNow;

  loadHeaderAndInit();
</script>
</body>
</html>
