<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Validation de commande</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #fff9eb;
    --sage:       #9fb2ac;
    --sage-dark:  #7a9490;
    --sage-light: #c8d8d4;
    --wine:       #5d0d18;
    --wine-dark:  #3e0910;
    --wine-light: #8c2030;
    --wine-pale:  #f5e6e8;
    --text:       #2a1a1c;
    --text-muted: #6b5055;
    --border:     #e8ddd0;
    --white:      #fffdf7;
    --shadow:     rgba(93,13,24,.10);
    --shadow-md:  rgba(93,13,24,.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  nav {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--wine);
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .nav-logo span { color: var(--sage-dark); font-weight: 400; font-style: italic; }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    text-decoration: none;
    color: var(--text-muted);
    font-size: .82rem;
    font-weight: 500;
    letter-spacing: .09em;
    text-transform: uppercase;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--wine); }
  .btn-back {
    background: var(--wine-pale);
    color: var(--wine);
    padding: 0.5rem 1.3rem;
    border-radius: 3px;
    text-decoration: none;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-back:hover {
    background: var(--wine);
    color: var(--cream);
  }

  .page-header {
    background: var(--wine);
    padding: 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    right: -80px;
    top: -80px;
    width: 420px;
    height: 420px;
    border: 55px solid rgba(255,249,235,.05);
    border-radius: 50%;
  }
  .page-header::after {
    content: '';
    position: absolute;
    left: 4%;
    bottom: -70px;
    width: 240px;
    height: 240px;
    border: 40px solid rgba(159,178,172,.10);
    border-radius: 50%;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left .header-eyebrow {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: .9rem;
  }
  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--cream);
  }
  .header-left p {
    color: rgba(255,249,235,.62);
    font-size: .9rem;
  }

  .container {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .checkout-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
  }

  /* Formulaire */
  .checkout-form {
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 1.5rem;
  }
  .form-section {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .form-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .form-section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 0.7rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--wine);
  }
  .radio-group {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 0.5rem 0;
  }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    text-transform: none;
    letter-spacing: normal;
    font-weight: normal;
  }

  /* Resumen del pedido */
  .order-summary-card {
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 1.5rem;
    position: sticky;
    top: 90px;
  }
  .order-summary-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .shop-info-mini {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .shop-info-mini img {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    object-fit: cover;
  }
  .shop-info-mini h4 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--wine);
  }
  .order-items {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .order-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
  }
  .order-item-name {
    flex: 2;
  }
  .order-item-price {
    flex: 1;
    text-align: right;
  }
  .order-total {
    padding-top: 1rem;
    border-top: 2px solid var(--border);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    font-size: 0.9rem;
  }
  .total-row.grand-total {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--wine);
    padding-top: 0.8rem;
    margin-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .btn-confirm {
    width: 100%;
    background: var(--wine);
    color: white;
    border: none;
    padding: 0.9rem;
    border-radius: 40px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 1rem;
  }
  .btn-confirm:hover {
    background: var(--wine-dark);
  }

  .success-message {
    text-align: center;
    padding: 3rem;
    background: var(--white);
    border-radius: 12px;
    border: 1.5px solid var(--border);
  }
  .success-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }
  .success-message h2 {
    color: var(--wine);
    margin-bottom: 0.5rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--wine);
    color: var(--cream);
    padding: .85rem 1.5rem;
    border-radius: 5px;
    font-size: .86rem;
    font-weight: 500;
    box-shadow: 0 8px 28px var(--shadow-md);
    z-index: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all .35s cubic-bezier(.34,1.4,.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 800px) {
    .checkout-grid { grid-template-columns: 1fr; }
    .container { padding: 0 1rem; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🌿 Green<span>Market</span></div>
  <div class="nav-links">
    <a href="store.html">Accueil</a>
    <a href="store.html">Boutiques</a>
    <a href="#">Produits</a>
    <a href="#">À propos</a>
  </div>
  <a href="javascript:history.back()" class="btn-back">← Retour</a>
</nav>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">🛍️ FINALISER VOTRE COMMANDE</div>
      <h1>Validation<br>de commande</h1>
      <p>Vérifiez vos informations et confirmez votre achat</p>
    </div>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading" style="text-align:center; padding:3rem;">Chargement...</div>
  </div>
</div>

<div class="footer-note">
  🌿 GreenMarket – Mettre en valeur les producteurs locaux
</div>

<script>
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showToast(msg, bg = 'var(--wine)') {
    let toast = document.getElementById('toast');
    if (!toast) {
      const t = document.createElement('div');
      t.id = 'toast';
      t.className = 'toast';
      t.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:var(--wine);color:var(--cream);padding:.85rem 1.5rem;border-radius:5px;z-index:500;transform:translateY(80px);opacity:0;transition:all .35s';
      document.body.appendChild(t);
    }
    const t = document.getElementById('toast');
    t.innerHTML = msg;
    t.style.background = bg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  // Obtener datos de la URL
  function getCheckoutData() {
    const params = new URLSearchParams(window.location.search);
    return {
      shopId: params.get('shopId'),
      shopName: params.get('shopName'),
      products: JSON.parse(decodeURIComponent(params.get('products') || '[]'))
    };
  }

  // Extraer precio numérico
  function extractPrice(priceStr) {
    if (!priceStr) return 5;
    const match = priceStr.match(/(\d+(?:[.,]\d+)?)/);
    if (match) {
      return parseFloat(match[1].replace(',', '.'));
    }
    return 5;
  }

  function loadCheckout() {
    const data = getCheckoutData();
    
    if (!data.shopId || data.products.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="error" style="text-align:center; padding:3rem; background:var(--wine-pale); border-radius:8px;">
          <h2>❌ Panier vide</h2>
          <p>Aucun produit sélectionné pour la commande.</p>
          <a href="store.html" class="btn-back" style="margin-top:1rem; display:inline-block;">Retour aux boutiques</a>
        </div>
      `;
      return;
    }

    // Calcular totales
    let subtotal = 0;
    const itemsHtml = data.products.map(p => {
      const price = extractPrice(p.price);
      const quantity = 1;
      const total = price * quantity;
      subtotal += total;
      return `
        <div class="order-item">
          <span class="order-item-name">${escapeHtml(p.name)} x1</span>
          <span class="order-item-price">${total.toFixed(2)} €</span>
        </div>
      `;
    }).join('');

    const delivery = 5;
    const total = subtotal + delivery;

    const html = `
      <div class="checkout-grid">
        <div class="checkout-form">
          <div class="form-section">
            <h3>📋 Informations de livraison</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="firstName" placeholder="Votre prénom">
              </div>
              <div class="form-group">
                <label>Nom</label>
                <input type="text" id="lastName" placeholder="Votre nom">
              </div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="votre@email.com">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="tel" id="phone" placeholder="06 12 34 56 78">
            </div>
            <div class="form-group">
              <label>Adresse</label>
              <input type="text" id="address" placeholder="Numéro et rue">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Code postal</label>
                <input type="text" id="zipcode" placeholder="75001">
              </div>
              <div class="form-group">
                <label>Ville</label>
                <input type="text" id="city" placeholder="Paris">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>🚚 Mode de livraison</h3>
            <div class="radio-group">
              <label><input type="radio" name="delivery" value="delivery" checked> 📦 Livraison à domicile (5€)</label>
              <label><input type="radio" name="delivery" value="pickup"> 🏪 Retrait en boutique (Gratuit)</label>
            </div>
          </div>

          <div class="form-section">
            <h3>💳 Mode de paiement</h3>
            <div class="radio-group">
              <label><input type="radio" name="payment" value="card" checked> 💳 Carte bancaire</label>
              <label><input type="radio" name="payment" value="paypal"> 📱 PayPal</label>
              <label><input type="radio" name="payment" value="cash"> 💶 Espèce à la livraison</label>
            </div>
          </div>

          <div class="form-section">
            <h3>📝 Notes (optionnel)</h3>
            <textarea id="notes" rows="2" placeholder="Instructions particulières pour le livreur..."></textarea>
          </div>
        </div>

        <div class="order-summary-card">
          <h3>🛍️ Récapitulatif</h3>
          <div class="shop-info-mini">
            <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=100&h=100&fit=crop" onerror="this.src='https://picsum.photos/id/20/100/100'">
            <div>
              <h4>${escapeHtml(data.shopName)}</h4>
              <p style="font-size:0.7rem; color:var(--text-muted);">Boutique vérifiée</p>
            </div>
          </div>
          <div class="order-items">
            ${itemsHtml}
          </div>
          <div class="order-total">
            <div class="total-row">
              <span>Sous-total</span>
              <span>${subtotal.toFixed(2)} €</span>
            </div>
            <div class="total-row" id="deliveryRow">
              <span>Livraison</span>
              <span id="deliveryAmount">5.00 €</span>
            </div>
            <div class="total-row grand-total">
              <span>Total</span>
              <span id="totalAmount">${total.toFixed(2)} €</span>
            </div>
          </div>
          <button class="btn-confirm" onclick="confirmOrder('${data.shopId}', '${escapeHtml(data.shopName)}', ${JSON.stringify(data.products).replace(/</g, '\\u003c')})">
            ✅ Confirmer la commande
          </button>
        </div>
      </div>
    `;

    document.getElementById('content').innerHTML = html;

    // Actualizar total según el modo de entrega
    const deliveryRadios = document.querySelectorAll('input[name="delivery"]');
    deliveryRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        const deliveryAmount = e.target.value === 'pickup' ? 0 : 5;
        const subtotalValue = ${subtotal};
        const newTotal = subtotalValue + deliveryAmount;
        document.getElementById('deliveryAmount').textContent = deliveryAmount.toFixed(2) + ' €';
        document.getElementById('totalAmount').textContent = newTotal.toFixed(2) + ' €';
      });
    });
  }

  function confirmOrder(shopId, shopName, products) {
    // Récupérer les informations du formulaire
    const firstName = document.getElementById('firstName')?.value.trim() || '';
    const lastName = document.getElementById('lastName')?.value.trim() || '';
    const email = document.getElementById('email')?.value.trim() || '';
    const phone = document.getElementById('phone')?.value.trim() || '';
    const address = document.getElementById('address')?.value.trim() || '';
    const zipcode = document.getElementById('zipcode')?.value.trim() || '';
    const city = document.getElementById('city')?.value.trim() || '';
    const deliveryMethod = document.querySelector('input[name="delivery"]:checked')?.value;
    const paymentMethod = document.querySelector('input[name="payment"]:checked')?.value;
    const notes = document.getElementById('notes')?.value.trim() || '';

    // Validation basique
    if (!firstName || !lastName || !email || !address || !zipcode || !city) {
      showToast("⚠️ Veuillez remplir tous les champs obligatoires", '#9a4a00');
      return;
    }

    if (!email.includes('@')) {
      showToast("⚠️ Veuillez entrer un email valide", '#9a4a00');
      return;
    }

    // Calculer les totaux
    let subtotal = 0;
    products.forEach(p => {
      const price = extractPrice(p.price);
      subtotal += price;
    });
    const delivery = deliveryMethod === 'pickup' ? 0 : 5;
    const total = subtotal + delivery;

    // Créer la commande
    const order = {
      id: Date.now(),
      orderNumber: 'CMD-' + Date.now().toString().slice(-8),
      date: new Date().toLocaleString('fr-FR'),
      shopId: shopId,
      shopName: shopName,
      customer: {
        firstName,
        lastName,
        email,
        phone,
        address: `${address}, ${zipcode} ${city}`
      },
      products: products.map(p => ({
        id: p.id,
        name: p.name,
        price: p.price,
        quantity: 1
      })),
      subtotal: subtotal,
      delivery: delivery,
      total: total,
      deliveryMethod: deliveryMethod,
      paymentMethod: paymentMethod,
      notes: notes,
      status: 'confirmée'
    };

    // Sauvegarder
    const existingOrders = JSON.parse(localStorage.getItem('greenmarket_orders') || '[]');
    existingOrders.push(order);
    localStorage.setItem('greenmarket_orders', JSON.stringify(existingOrders));

    // Afficher le succès
    document.getElementById('content').innerHTML = `
      <div class="success-message">
        <div class="success-icon">✅</div>
        <h2>Commande confirmée !</h2>
        <p>Merci pour votre commande, ${escapeHtml(firstName)}.</p>
        <p><strong>N° de commande :</strong> ${order.orderNumber}</p>
        <p>Un email de confirmation a été envoyé à <strong>${escapeHtml(email)}</strong>.</p>
        <br>
        <a href="store.html" class="btn-back" style="display:inline-block;">← Retour aux boutiques</a>
      </div>
    `;

    showToast("✅ Commande confirmée !");
  }

  loadCheckout();
</script>
</body>
</html>
