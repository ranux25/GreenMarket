<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Validation de commande</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #fff9eb;
    --sage:       #9fb2ac;
    --sage-dark:  #7a9490;
    --sage-light: #c8d8d4;
    --wine:       #5d0d18;
    --wine-dark:  #3e0910;
    --wine-light: #8c2030;
    --wine-pale:  #f5e6e8;
    --text:       #2a1a1c;
    --text-muted: #6b5055;
    --border:     #e8ddd0;
    --white:      #fffdf7;
    --shadow:     rgba(93,13,24,.10);
    --shadow-md:  rgba(93,13,24,.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 0 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 700; color: var(--wine); display: flex; align-items: center; gap: .4rem; }
  .nav-logo span { color: var(--sage-dark); font-weight: 400; font-style: italic; }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { text-decoration: none; color: var(--text-muted); font-size: .82rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase; transition: color .2s; }
  .nav-links a:hover { color: var(--wine); }
  .btn-back { background: var(--wine-pale); color: var(--wine); padding: 0.5rem 1.3rem; border-radius: 3px; text-decoration: none; font-size: .78rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; transition: all .2s; }
  .btn-back:hover { background: var(--wine); color: var(--cream); }

  .page-header { background: var(--wine); padding: 2rem 2.5rem; position: relative; overflow: hidden; }
  .page-header::before { content: ''; position: absolute; right: -80px; top: -80px; width: 420px; height: 420px; border: 55px solid rgba(255,249,235,.05); border-radius: 50%; }
  .page-header::after { content: ''; position: absolute; left: 4%; bottom: -70px; width: 240px; height: 240px; border: 40px solid rgba(159,178,172,.10); border-radius: 50%; }
  .header-inner { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .header-left .header-eyebrow { font-size: .72rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--sage-light); margin-bottom: .9rem; }
  .header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--cream); }
  .header-left p { color: rgba(255,249,235,.62); font-size: .9rem; }

  .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

  .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }

  .checkout-form { background: var(--white); border-radius: 12px; border: 1.5px solid var(--border); padding: 1.5rem; }
  .form-section { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .form-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .form-section h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.3rem; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.7rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Jost', sans-serif; background: var(--cream); outline: none; transition: border-color 0.2s; font-size: 0.9rem; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--wine); }
  .form-group input.error-field { border-color: #c0392b; }
  .radio-group { display: flex; gap: 1.5rem; flex-wrap: wrap; padding: 0.5rem 0; }
  .radio-group label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; text-transform: none; letter-spacing: normal; font-weight: normal; cursor: pointer; }

  .order-summary-card { background: var(--white); border-radius: 12px; border: 1.5px solid var(--border); padding: 1.5rem; position: sticky; top: 90px; }
  .order-summary-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .shop-info-mini { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
  .shop-info-mini .shop-icon { width: 50px; height: 50px; border-radius: 8px; background: var(--sage-light); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
  .shop-info-mini h4 { font-size: 0.9rem; font-weight: 700; color: var(--wine); }
  .shop-info-mini p { font-size: 0.7rem; color: var(--text-muted); }
  .order-items { max-height: 300px; overflow-y: auto; margin-bottom: 1rem; }
  .order-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .order-item:last-child { border-bottom: none; }
  .order-item-img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: var(--sage-light); flex-shrink: 0; }
  .order-item-details { flex: 1; min-width: 0; }
  .order-item-name { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-item-meta { font-size: 0.72rem; color: var(--text-muted); }
  .order-item-total { font-size: 0.85rem; font-weight: 700; color: var(--wine); flex-shrink: 0; }
  .order-total { padding-top: 1rem; border-top: 2px solid var(--border); }
  .total-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; }
  .total-row .label { color: var(--text-muted); }
  .total-row.grand-total { font-weight: 700; font-size: 1.1rem; color: var(--wine); padding-top: 0.8rem; margin-top: 0.5rem; border-top: 1px solid var(--border); }
  .btn-confirm { width: 100%; background: var(--wine); color: white; border: none; padding: 0.9rem; border-radius: 40px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; margin-top: 1rem; font-family: 'Jost', sans-serif; }
  .btn-confirm:hover { background: var(--wine-dark); }
  .btn-confirm:disabled { background: var(--sage); cursor: not-allowed; }

  .success-card { text-align: center; padding: 3rem 2rem; background: var(--white); border-radius: 12px; border: 1.5px solid var(--border); box-shadow: 0 20px 40px var(--shadow); }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; }
  .success-card h2 { color: var(--wine); font-family: 'Cormorant Garamond', serif; font-size: 2rem; margin-bottom: 0.5rem; }
  .success-card p { color: var(--text-muted); margin-bottom: 0.4rem; }
  .order-number { display: inline-block; background: var(--wine-pale); color: var(--wine); font-weight: 700; padding: 0.4rem 1rem; border-radius: 20px; margin: 0.8rem 0; font-size: 1rem; }
  .success-actions { margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-filled { background: var(--wine); color: white; padding: 0.7rem 1.5rem; border-radius: 3px; text-decoration: none; font-size: 0.9rem; font-weight: 600; display: inline-block; transition: background 0.2s; }
  .btn-filled:hover { background: var(--wine-dark); }

  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--wine); color: var(--cream); padding: .85rem 1.5rem; border-radius: 5px; font-size: .86rem; font-weight: 500; box-shadow: 0 8px 28px var(--shadow-md); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all .35s cubic-bezier(.34,1.4,.64,1); }
  .toast.show { transform: translateY(0); opacity: 1; }

  .footer-note { text-align: center; margin-top: 3rem; padding: 1.5rem; color: var(--text-muted); border-top: 1px solid var(--border); }

  @media (max-width: 800px) {
    .checkout-grid { grid-template-columns: 1fr; }
    .container { padding: 0 1rem; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .form-row { grid-template-columns: 1fr; }
    .order-summary-card { position: static; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🌿 Green<span>Market</span></div>
  <div class="nav-links">
    <a href="store.html">Accueil</a>
    <a href="store.html">Boutiques</a>
    <a href="#">Produits</a>
    <a href="#">À propos</a>
  </div>
  <a href="javascript:history.back()" class="btn-back">← Retour</a>
</nav>

<div class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">🛍️ FINALISER VOTRE COMMANDE</div>
      <h1>Validation<br>de commande</h1>
      <p>Vérifiez vos informations et confirmez votre achat</p>
    </div>
  </div>
</div>

<div class="container">
  <div id="content">
    <div style="text-align:center; padding:3rem;">Chargement...</div>
  </div>
</div>

<div class="footer-note">🌿 GreenMarket – Mettre en valeur les producteurs locaux</div>

<script>
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  function showToast(msg, bg = 'var(--wine)') {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.className = 'toast';
      document.body.appendChild(t);
    }
    t.innerHTML = msg;
    t.style.background = bg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function extractPrice(priceStr) {
    if (typeof priceStr === 'number') return priceStr;
    if (!priceStr) return 5;
    const match = String(priceStr).match(/(\d+(?:[.,]\d+)?)/);
    return match ? parseFloat(match[1].replace(',', '.')) : 5;
  }

  function getCheckoutData() {
    const params = new URLSearchParams(window.location.search);
    let products = [];
    try {
      const raw = params.get('products');
      if (raw) products = JSON.parse(decodeURIComponent(raw));
    } catch(e) {
      console.error('Erreur parsing products:', e);
    }
    return {
      shopId: params.get('shopId') || '',
      shopName: decodeURIComponent(params.get('shopName') || 'Boutique'),
      products: products
    };
  }

  function updateTotals(products, deliveryMode) {
    let subtotal = 0;
    products.forEach(p => {
      const price = extractPrice(p.price);
      const qty = p.quantity || 1;
      subtotal += price * qty;
    });
    const delivery = deliveryMode === 'pickup' ? 0 : 5;
    const total = subtotal + delivery;
    const el = id => document.getElementById(id);
    if (el('subtotalAmount')) el('subtotalAmount').textContent = subtotal.toFixed(2) + ' €';
    if (el('deliveryAmount')) el('deliveryAmount').textContent = delivery.toFixed(2) + ' €';
    if (el('totalAmount')) el('totalAmount').textContent = total.toFixed(2) + ' €';
    if (el('deliveryLabel')) el('deliveryLabel').textContent = deliveryMode === 'pickup' ? 'Retrait (gratuit)' : 'Livraison';
    return { subtotal, delivery, total };
  }

  function loadCheckout() {
    const data = getCheckoutData();

    if (!data.shopId || data.products.length === 0) {
      document.getElementById('content').innerHTML = `
        <div style="text-align:center; padding:3rem; background:var(--wine-pale); border-radius:12px; border:1.5px solid var(--border);">
          <div style="font-size:3rem; margin-bottom:1rem;">🛒</div>
          <h2 style="color:var(--wine); margin-bottom:0.5rem;">Panier vide</h2>
          <p style="color:var(--text-muted); margin-bottom:1.5rem;">Aucun produit sélectionné pour la commande.</p>
          <a href="store.html" class="btn-filled">← Retour aux boutiques</a>
        </div>
      `;
      return;
    }

    // Construire les lignes de produits
    const itemsHtml = data.products.map(p => {
      const price = extractPrice(p.price);
      const qty = p.quantity || 1;
      const total = price * qty;
      return `
        <div class="order-item">
          <img src="${escapeHtml(p.image || '')}" class="order-item-img"
               onerror="this.src='https://images.unsplash.com/photo-1542838132-92c533f91d2a?w=80&h=80&fit=crop'">
          <div class="order-item-details">
            <div class="order-item-name">${escapeHtml(p.name)}</div>
            <div class="order-item-meta">${escapeHtml(String(p.price))} × ${qty}</div>
          </div>
          <div class="order-item-total">${total.toFixed(2)} €</div>
        </div>
      `;
    }).join('');

    const html = `
      <div class="checkout-grid">

        <!-- FORMULAIRE -->
        <div class="checkout-form">

          <div class="form-section">
            <h3>📋 Informations de livraison</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="firstName" placeholder="Votre prénom" autocomplete="given-name">
              </div>
              <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="lastName" placeholder="Votre nom" autocomplete="family-name">
              </div>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input type="tel" id="phone" placeholder="06 12 34 56 78" autocomplete="tel">
            </div>
            <div id="addressSection">
              <div class="form-group">
                <label>Adresse *</label>
                <input type="text" id="address" placeholder="Numéro et rue" autocomplete="street-address">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Code postal *</label>
                  <input type="text" id="zipcode" placeholder="75001" autocomplete="postal-code">
                </div>
                <div class="form-group">
                  <label>Ville *</label>
                  <input type="text" id="city" placeholder="Paris" autocomplete="address-level2">
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>🚚 Mode de livraison</h3>
            <div class="radio-group">
              <label><input type="radio" name="delivery" value="delivery" checked> 📦 Livraison à domicile (+5€)</label>
              <label><input type="radio" name="delivery" value="pickup"> 🏪 Retrait en boutique (Gratuit)</label>
            </div>
          </div>

          <div class="form-section">
            <h3>💳 Mode de paiement</h3>
            <div class="radio-group">
              <label><input type="radio" name="payment" value="card" checked> 💳 Carte bancaire</label>
              <label><input type="radio" name="payment" value="paypal"> 📱 PayPal</label>
              <label><input type="radio" name="payment" value="cash"> 💶 Espèce à la livraison</label>
            </div>
          </div>

          <div class="form-section">
            <h3>📝 Notes (optionnel)</h3>
            <div class="form-group">
              <textarea id="notes" rows="2" placeholder="Instructions particulières pour le livreur..."></textarea>
            </div>
          </div>

        </div>

        <!-- RÉCAPITULATIF -->
        <div class="order-summary-card">
          <h3>🛍️ Récapitulatif</h3>
          <div class="shop-info-mini">
            <div class="shop-icon">🌿</div>
            <div>
              <h4>${escapeHtml(data.shopName)}</h4>
              <p>Boutique vérifiée</p>
            </div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">
            <div class="total-row">
              <span class="label">Sous-total</span>
              <span id="subtotalAmount">0.00 €</span>
            </div>
            <div class="total-row">
              <span class="label" id="deliveryLabel">Livraison</span>
              <span id="deliveryAmount">5.00 €</span>
            </div>
            <div class="total-row grand-total">
              <span>Total</span>
              <span id="totalAmount">0.00 €</span>
            </div>
          </div>
          <button class="btn-confirm" id="confirmBtn">✅ Confirmer la commande</button>
        </div>

      </div>
    `;

    document.getElementById('content').innerHTML = html;

    // Initialiser les totaux
    updateTotals(data.products, 'delivery');

    // Mise à jour dynamique selon le mode de livraison
    document.querySelectorAll('input[name="delivery"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const mode = e.target.value;
        updateTotals(data.products, mode);
        const addrSection = document.getElementById('addressSection');
        if (addrSection) {
          addrSection.style.display = mode === 'pickup' ? 'none' : 'block';
        }
      });
    });

    // Bouton confirmer
    document.getElementById('confirmBtn').onclick = () => confirmOrder(data);
  }

  function confirmOrder(data) {
    const val = id => document.getElementById(id)?.value.trim() || '';
    const firstName = val('firstName');
    const lastName  = val('lastName');
    const email     = val('email');
    const phone     = val('phone');
    const address   = val('address');
    const zipcode   = val('zipcode');
    const city      = val('city');
    const notes     = val('notes');
    const deliveryMethod = document.querySelector('input[name="delivery"]:checked')?.value || 'delivery';
    const paymentMethod  = document.querySelector('input[name="payment"]:checked')?.value || 'card';

    // Validation
    const errors = [];
    if (!firstName) errors.push('firstName');
    if (!lastName)  errors.push('lastName');
    if (!email)     errors.push('email');
    if (deliveryMethod !== 'pickup') {
      if (!address) errors.push('address');
      if (!zipcode) errors.push('zipcode');
      if (!city)    errors.push('city');
    }

    // Reset styles erreur
    document.querySelectorAll('.error-field').forEach(el => el.classList.remove('error-field'));

    if (errors.length > 0) {
      errors.forEach(id => document.getElementById(id)?.classList.add('error-field'));
      showToast("⚠️ Veuillez remplir tous les champs obligatoires (*)", '#9a4a00');
      return;
    }

    if (!email.includes('@')) {
      document.getElementById('email')?.classList.add('error-field');
      showToast("⚠️ Veuillez entrer un email valide", '#9a4a00');
      return;
    }

    // Calculer les totaux finaux
    let subtotal = 0;
    data.products.forEach(p => {
      const price = extractPrice(p.price);
      const qty = p.quantity || 1;
      subtotal += price * qty;
    });
    const delivery = deliveryMethod === 'pickup' ? 0 : 5;
    const total = subtotal + delivery;

    // Créer la commande
    const order = {
      id: Date.now(),
      orderNumber: 'CMD-' + Date.now().toString().slice(-8),
      date: new Date().toLocaleString('fr-FR'),
      shopId: data.shopId,
      shopName: data.shopName,
      customer: {
        firstName, lastName, email, phone,
        address: deliveryMethod === 'pickup' ? 'Retrait en boutique' : `${address}, ${zipcode} ${city}`
      },
      products: data.products.map(p => ({
        id: p.id,
        name: p.name,
        price: p.price,
        quantity: p.quantity || 1
      })),
      subtotal,
      delivery,
      total,
      deliveryMethod,
      paymentMethod,
      notes,
      status: 'confirmée'
    };

    // Sauvegarder dans localStorage
    const existingOrders = JSON.parse(localStorage.getItem('greenmarket_orders') || '[]');
    existingOrders.push(order);
    localStorage.setItem('greenmarket_orders', JSON.stringify(existingOrders));

    // Afficher le succès
    document.getElementById('content').innerHTML = `
      <div class="success-card">
        <div class="success-icon">🎉</div>
        <h2>Commande confirmée !</h2>
        <p>Merci pour votre commande, <strong>${escapeHtml(firstName)} ${escapeHtml(lastName)}</strong>.</p>
        <div class="order-number">N° ${order.orderNumber}</div>
        <p>Un email de confirmation sera envoyé à <strong>${escapeHtml(email)}</strong>.</p>
        <p style="margin-top:0.5rem;">
          <strong>Total payé :</strong> ${total.toFixed(2)} €
          &nbsp;·&nbsp;
          <strong>Livraison :</strong> ${deliveryMethod === 'pickup' ? 'Retrait en boutique' : 'À domicile'}
        </p>
        <div class="success-actions">
          <a href="store.html" class="btn-filled">🏠 Retour aux boutiques</a>
          <a href="shop-detail.html?id=${data.shopId}" class="btn-back" style="display:inline-block;">← Retour à la boutique</a>
        </div>
      </div>
    `;

    showToast("✅ Commande confirmée !");
  }

  loadCheckout();
</script>
</body>
</html>
