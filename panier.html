<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>GreenMarket – Mon Panier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
<style>
:root{
  --cream:#fff9eb;
  --sage:#9fb2ac;
  --sage-dark:#7a9490;
  --wine:#5d0d18;
  --wine-dark:#3e0910;
  --border:#e8ddd0;
  --white:#fffdf7;
  --text:#2a1a1c;
  --text-muted:#6b5055;
  --shadow:rgba(93,13,24,.12);
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{ 
  font-family:'Lato', sans-serif; 
  background:var(--cream); 
  color:var(--text); 
  margin:0;
  padding:0;
}

#header-placeholder { width: 100%; }

.btn-back{
  background:var(--wine);
  color:white;
  padding:.6rem 1rem;
  border-radius:4px;
  text-decoration:none;
  font-size:.8rem;
  font-weight:600;
  display: inline-block;
  margin-top: 10px;
}

.page-header{
  background:var(--wine);
  color:white;
  padding:3rem 2rem;
}

.page-header h1{
  font-family:'Playfair Display', serif;
  font-size:3rem;
}

.container{
  max-width:1100px;
  margin:2rem auto;
  padding:0 1rem;
}

.cart-layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:2rem;
}

.cart-items{
  background:var(--white);
  border-radius:10px;
  padding:1.5rem;
  box-shadow:0 10px 30px var(--shadow);
}

.cart-item{
  display:flex;
  gap:1rem;
  padding:1rem 0;
  border-bottom:1px solid var(--border);
}

.cart-item img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

.item-info{ flex:1; }

.item-name{ font-weight:700; color:var(--wine); font-size:1rem; }

.item-shop{ font-size:.8rem; color:var(--text-muted); margin:.3rem 0; }

.item-price{ font-size:1rem; font-weight:700; color:var(--sage-dark); }

.quantity-controls{ display:flex; align-items:center; gap:.5rem; margin-top:.7rem; }

.quantity-controls button{
  width:30px; height:30px; border:none; background:var(--wine);
  color:white; border-radius:4px; cursor:pointer;
}

.btn-delete{
  background:#eee; color:var(--wine); border:none;
  padding:.5rem .8rem; border-radius:4px; cursor:pointer; margin-top:.8rem;
}

.summary{
  background:var(--white);
  border-radius:10px;
  padding:1.5rem;
  height:fit-content;
  box-shadow:0 10px 30px var(--shadow);
}

.summary h2{ font-family:'Playfair Display', serif; margin-bottom:1rem; }

.summary-line{ display:flex; justify-content:space-between; margin:.8rem 0; }

.total{
  font-size:1.3rem; font-weight:700; color:var(--wine);
  border-top:1px solid var(--border); padding-top:1rem;
}

.btn-checkout{
  width:100%; margin-top:1.5rem; background:var(--wine);
  color:white; border:none; padding:1rem; border-radius:6px;
  font-weight:700; cursor:pointer; font-size:1rem;
}

.btn-checkout:hover{ background:var(--wine-dark); }

.btn-clear{
  width:100%; margin-top:1rem; background:var(--sage);
  color:white; border:none; padding:.8rem; border-radius:6px; cursor:pointer;
}

.empty{ text-align:center; padding:4rem; background:var(--white); border-radius:10px; }

@media(max-width:850px){
  .cart-layout{ grid-template-columns:1fr; }
  .cart-item{ flex-direction:column; }
  .cart-item img{ width:100%; height:220px; }
}
</style>
</head>

<body>

<div id="header-placeholder"></div>

<div class="page-header">
  <h1>🛒 Mon Panier</h1>
  <p>Retrouvez tous vos produits sélectionnés</p>
</div>

<div class="container">
  <div id="cartContent"></div>
</div>

<script>
  // ========== FUNCIONES GLOBALES ==========
  function showToast(msg, bg = 'var(--wine)') {
    let toast = document.getElementById('toast');
    if (!toast) {
      const t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = `
        position: fixed; bottom: 28px; right: 28px;
        background: var(--wine); color: #fff;
        padding: 14px 22px; border-radius: 12px;
        font-family: 'Lato', sans-serif; font-weight: 700;
        font-size: 14px; box-shadow: 0 8px 24px rgba(93,13,24,0.3);
        z-index: 9999; transform: translateY(80px);
        opacity: 0; transition: transform 0.35s, opacity 0.3s;
        pointer-events: none;
      `;
      document.body.appendChild(t);
    }
    toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = bg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function updateCartCount() {
    const panier = getPanier();
    const total = panier.reduce((sum, item) => sum + (item.quantite || 1), 0);
    const badge = document.getElementById('cart-count');
    if (badge) badge.textContent = total;
  }

  // ========== FUNCIONES DEL PANIER ==========
  function getPanier(){
    const saved = localStorage.getItem('greenmarket_panier');
    return saved ? JSON.parse(saved) : [];
  }

  function savePanier(panier){
    localStorage.setItem('greenmarket_panier', JSON.stringify(panier));
    updateCartCount();
    renderCart();
  }

  function removeItem(id){
    let panier = getPanier();
    panier = panier.filter(item => item.id !== id);
    savePanier(panier);
    showToast("🗑️ Produit supprimé du panier");
  }

  function changeQuantity(id, delta){
    let panier = getPanier();
    panier = panier.map(item => {
      if(item.id === id){
        item.quantite = Math.max(1, item.quantite + delta);
      }
      return item;
    });
    savePanier(panier);
  }

  function clearCart(){
    if(confirm("Vider le panier ?")){
      localStorage.removeItem('greenmarket_panier');
      updateCartCount();
      renderCart();
      showToast("🛒 Panier vidé");
    }
  }

  function getTotal(panier){
    return panier.reduce((sum,item) => sum + (item.prixNumerique * item.quantite), 0);
  }

  function goCheckout(){
    const panier = getPanier();
    if(panier.length === 0){
      showToast("🛒 Votre panier est vide", "#9a4a00");
      return;
    }
    const productosParaCheckout = panier.map(item => ({
      id: item.id,
      name: item.nom,
      price: item.prix,
      image: item.image,
      quantity: item.quantite,
      boutiqueId: item.boutiqueId,
      boutiqueNom: item.boutiqueNom
    }));
    
    const encoded = encodeURIComponent(JSON.stringify(productosParaCheckout));
    window.location.href = `checkout.html?products=${encoded}`;
  }

  function renderCart(){
    const panier = getPanier();
    const container = document.getElementById('cartContent');

    if(panier.length === 0){
      container.innerHTML = `
        <div class="empty">
          <h2>🛒 Votre panier est vide</h2>
          <a href="store.html" class="btn-back">← Continuer les achats</a>
        </div>
      `;
      return;
    }

    const total = getTotal(panier);

    container.innerHTML = `
      <div class="cart-layout">
        <div class="cart-items">
          ${panier.map(item => `
            <div class="cart-item">
              <img src="${item.image}" alt="${item.nom}" onerror="this.src='https://placehold.co/110x110?text=Produit'">
              <div class="item-info">
                <div class="item-name">${escapeHtml(item.nom)}</div>
                <div class="item-shop">Boutique : ${escapeHtml(item.boutiqueNom)}</div>
                <div class="item-price">${item.prix}</div>
                <div class="quantity-controls">
                  <button onclick="changeQuantity(${item.id}, -1)">-</button>
                  <span>${item.quantite}</span>
                  <button onclick="changeQuantity(${item.id}, 1)">+</button>
                </div>
                <button class="btn-delete" onclick="removeItem(${item.id})">🗑️ Supprimer</button>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="summary">
          <h2>Résumé</h2>
          <div class="summary-line">
            <span>Produits</span>
            <span>${panier.length}</span>
          </div>
          <div class="summary-line total">
            <span>Total</span>
            <span>${total.toFixed(2)} €</span>
          </div>
          <button class="btn-checkout" onclick="goCheckout()">✅ Passer la commande</button>
          <button class="btn-clear" onclick="clearCart()">🗑️ Vider le panier</button>
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ========== CARGAR HEADER ==========
  async function loadHeaderAndInit() {
    try {
      const response = await fetch('header.html');
      if (!response.ok) throw new Error('Error cargando header');
      const headerHtml = await response.text();
      document.getElementById('header-placeholder').innerHTML = headerHtml;
      
      setTimeout(() => {
        updateCartCount();
        renderCart();
      }, 100);
    } catch (error) {
      console.error('Error:', error);
      renderCart();
    }
  }

  // Iniciar
  loadHeaderAndInit();
</script>
</body>
</html>
