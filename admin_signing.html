<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>GreenMarket | Connexion Administrateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    <div class="d-flex gap-2 align-items-center mb-4">
      <img src="IMAGES/logo.png" alt="logo" style="width: 60px; height: 60px; object-fit: cover;" class="rounded-circle">
      <h1 class="h3 mb-0 fw-bold text-theme">GreenMarket</h1>
    </div>

    <div class="card p-4 shadow-sm w-100" style="max-width: 450px; border-radius: 12px; border: none;">
      
      <div class="text-center mb-4">
        <h2 class="fw-bold h4">Connexion Administrateur</h2>
        <p class="text-muted small">Accès au panneau de configuration</p>
      </div>

      <form>
        <div class="mb-3">
          <label for="Email" class="form-label small fw-medium">Adresse Email</label>
          <input type="email" class="form-control" id="Email" placeholder="vous@exemple.com" name="email">
        </div>

        <div class="mb-3">
          <label for="Password" class="form-label small fw-medium">Mot de passe</label>
          <input type="password" class="form-control" id="Password" placeholder="Entrez votre mot de passe" name="password">
        </div>

        <input type="submit" class="custom-submit-btn w-100 p-2 fw-bold rounded" value="Se connecter">

        <div class="d-flex justify-content-between mb-4 mt-3">
          <div class="form-check mb-0">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label small text-muted" for="remember">
              Se souvenir de moi
            </label>
          </div>
          <div>
            <a class="text-decoration-none text-muted small" href="forgot_password.html">Mot de passe oublié</a>
          </div>
        </div>

        <p class="text-center mt-3 mb-0 text-muted small">
          <a href="create.html" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Retour à GreenMarket</a>
        </p>
      </form>
      
    </div>
  </div>

  <script>
    function loadHeader() {
      fetch('header.html')
        .then(response => {
          if (!response.ok) throw new Error("Erreur");
          return response.text();
        })
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => {
          console.error(error);
        });
    }
    loadHeader();
  </script>
</body>
</html>
