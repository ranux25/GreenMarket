<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirection Dashboard - GreenMarket</title>
  <style>
    body {
      font-family: 'Lato', sans-serif;
      background: #fff9eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .loader {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e8ddd0;
      border-top-color: #5d0d18;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirection vers votre tableau de bord...</p>
  </div>

  <script>
    const userJson = sessionStorage.getItem('greenmarket_current_user');
    
    if (!userJson) {
      // Non connecté, rediriger vers connexion
      window.location.href = 'signin.html';
    } else {
      const user = JSON.parse(userJson);
      
      // Rediriger selon le rôle
      if (user.role === 'admin') {
        window.location.href = 'dashboard_admin.html';
      } else if (user.role === 'productor') {
        window.location.href = 'dashboard-producteur.html';
      } else if (user.role === 'client') {
        window.location.href = 'dashboard_client.html';
      } else {
        window.location.href = 'accueil.html';
      }
    }
  </script>
</body>
</html>
