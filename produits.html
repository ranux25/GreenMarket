<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMarket – Tous nos produits</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { background-color: #fff9eb; font-family: 'Jost', sans-serif; margin: 0; }
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
  .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e8ddd0; transition: transform 0.3s; cursor: pointer; }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .product-img { width: 100%; height: 200px; background: #eee; }
  .product-info { padding: 1.5rem; }
  h2 { font-family: 'Cormorant Garamond', serif; margin-bottom: 2rem; color: #5d0d18; }
</style>
</head>
<body>

<nav style="background:white; padding:1rem 2rem; display:flex; justify-content:space-between; border-bottom:1px solid #e8ddd0;">
  <div style="font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:#5d0d18;">🌿 GreenMarket</div>
  <a href="accueil.html" style="color:#5d0d18; text-decoration:none; font-weight:600;">Accueil</a>
</nav>

<div class="container">
  <h2>Tous nos produits</h2>
  <div class="grid" id="productGrid">
  </div>
</div>

<script>
  function renderAllProducts() {
    const grid = document.getElementById('productGrid');
    const stores = JSON.parse(localStorage.getItem('greenmarket_stores') || '[]');
    let allProducts = [];

    stores.forEach(store => {
      const products = JSON.parse(localStorage.getItem(`products_${store.id}`) || '[]');
      products.forEach(p => {
        allProducts.push({ ...p, shopId: store.id });
      });
    });

    if (allProducts.length === 0) {
      grid.innerHTML = '<p>Aucun produit disponible pour le moment.</p>';
      return;
    }

    grid.innerHTML = allProducts.map(p => `
      <div class="product-card" onclick="window.location.href='info-store.html?id=${p.shopId}'">
        <div class="product-img">
          <img src="${p.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="product-info">
          <h3>${p.name}</h3>
          <p style="color:#5d0d18; font-weight:600;">${p.price}</p>
        </div>
      </div>
    `).join('');
  }

  renderAllProducts();
</script>

</body>
</html>
